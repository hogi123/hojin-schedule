                }
            };
            document.getElementById('btn-range-cancel').onclick = () => {
                document.getElementById('range-action-modal').style.display = 'none';
            };
        }

        // Touch Swipe Navigation for Calendar (Native Feel)
        const calendarEl = document.getElementById('calendar');
        let touchStartX = 0;
        let touchStartY = 0;
        let touchCurrentX = 0;
        let isSwiping = false;
        let swipeDirectionDetermined = false;

        calendarEl.addEventListener('touchstart', e => {
            if (isMonthAnimating) return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            touchCurrentX = touchStartX;
            isSwiping = true;
            swipeDirectionDetermined = false;
            calendarEl.style.transition = 'none'; // Disable transition for 1:1 finger tracking
        }, { passive: true });

        calendarEl.addEventListener('touchmove', e => {
            if (!isSwiping || isMonthAnimating) return;
            const currentY = e.changedTouches[0].screenY;
            touchCurrentX = e.changedTouches[0].screenX;

            const deltaX = touchCurrentX - touchStartX;
            const deltaY = currentY - touchStartY;

            if (!swipeDirectionDetermined) {
                // If moving more vertically than horizontally, it's a scroll
                if (Math.abs(deltaY) > Math.abs(deltaX)) {
                    isSwiping = false;
                    calendarEl.style.transform = '';
                    return;
                }
                swipeDirectionDetermined = true;
            }

            // Only horizontal swipes reach here, prevent page bouncy/scrolling
            if (e.cancelable) e.preventDefault();

            // Drag the calendar grid directly with the finger
            calendarEl.style.transform = `translateX(${deltaX}px)`;
        }, { passive: false });

        calendarEl.addEventListener('touchend', e => {
            if (!isSwiping || isMonthAnimating) return;
            isSwiping = false;
            const deltaX = touchCurrentX - touchStartX;
            const swipeThreshold = 50;

            if (deltaX < -swipeThreshold) {
                // Swiped Left -> Next Month
                changeMonth(1, true, deltaX);
            } else if (deltaX > swipeThreshold) {
                // Swiped Right -> Prev Month
                changeMonth(-1, true, deltaX);
            } else {
                // Drag not far enough, snap back to center
                calendarEl.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                calendarEl.style.transform = 'translateX(0)';
                setTimeout(() => {
                    calendarEl.style.transition = '';
                }, 300);
            }
        }, { passive: true });

        // ====== Health Calendar & Workout Logger ======
        function renderHealthCalendar() {
            const monthEl = document.getElementById('health-current-month');
            const calGrid = document.getElementById('health-calendar');
            if (!monthEl || !calGrid) return;
            monthEl.innerText = `${calHealthYear}년 ${calHealthMonth + 1}월`;
            calGrid.innerHTML = '';

            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            dayNames.forEach((d, i) => {
                const hdr = document.createElement('div');
                hdr.className = 'day-header' + (i === 0 ? ' sunday' : i === 6 ? ' saturday' : '');
                hdr.innerText = d;
                calGrid.appendChild(hdr);
            });

            const firstDayIndex = new Date(calHealthYear, calHealthMonth, 1).getDay();
            const lastDate = new Date(calHealthYear, calHealthMonth + 1, 0).getDate();
            const totalCells = 42;

            for (let i = 0; i < totalCells; i++) {
                const cel = document.createElement('div');
                cel.className = 'calendar-cell';
                const d = i - firstDayIndex + 1;

                if (d >= 1 && d <= lastDate) {
                    const dateStr = `${calHealthYear}-${String(calHealthMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const numContainer = document.createElement('div');
                    numContainer.className = 'day-number-container';
                    numContainer.style.position = 'relative';

                    const numEl = document.createElement('div');
                    numEl.className = 'day-number';
                    numEl.innerText = d;
                    numContainer.appendChild(numEl);
                    cel.appendChild(numContainer);

                    if (healthData[dateStr]) {
                        const filled = healthData[dateStr].filter(w => w.name && w.name.trim() !== '').length;
                        if (filled > 0) {
                            const badge = document.createElement('div');
                            badge.style.cssText = 'font-size:9px;color:#e74c3c;font-weight:bold;margin-top:1px;';
                            badge.innerText = `💪${filled}`;
                            cel.appendChild(badge);
                        }
                    }

                    const col = i % 7;
                    if (col === 0) numEl.style.color = '#e74c3c';
                    if (col === 6) numEl.style.color = '#3498db';

                    const today = new Date();
                    if (calHealthYear === today.getFullYear() && calHealthMonth === today.getMonth() && d === today.getDate()) {
                        cel.classList.add('today');
                    }
                    if (dateStr === healthSelectedDate) {
                        cel.classList.add('selected');
                    }

                    if (healthMarks[dateStr] === 'circle' || (Array.isArray(healthMarks[dateStr]) && healthMarks[dateStr].includes('circle'))) {
                        numEl.classList.add('mark-circle');
                    }

                    if (healthMarks[dateStr] === 'x' || (Array.isArray(healthMarks[dateStr]) && healthMarks[dateStr].includes('x'))) {
                        const xLayer = document.createElement('div');
                        xLayer.className = 'mark-x-layer';
                        numContainer.appendChild(xLayer);
                    }

                    cel.onclick = () => {
                        healthSelectedDate = dateStr;
                        healthClickCounts[dateStr] = (healthClickCounts[dateStr] || 0) + 1;
                        if (healthClickTimers[dateStr]) clearTimeout(healthClickTimers[dateStr]);
                        healthClickTimers[dateStr] = setTimeout(() => {
                            let count = healthClickCounts[dateStr];
                            healthClickCounts[dateStr] = 0;

                            if (!Array.isArray(healthMarks[dateStr])) {
                                healthMarks[dateStr] = healthMarks[dateStr] ? [healthMarks[dateStr]] : [];
                            }
                            
                            if (count === 2) {
                                if (healthMarks[dateStr].includes('circle')) {
                                    healthMarks[dateStr] = healthMarks[dateStr].filter(m => m !== 'circle');
                                } else {
                                    healthMarks[dateStr].push('circle');
                                }
                            } else if (count >= 3) {
                                if (healthMarks[dateStr].includes('x')) {
                                    healthMarks[dateStr] = healthMarks[dateStr].filter(m => m !== 'x');
                                } else {
                                    healthMarks[dateStr].push('x');
                                }
                            }
                            
                            saveHealthMarks();
                            renderHealthCalendar();
                            renderWorkoutLogs();
                        }, 300);
                    };
                } else {
                    cel.classList.add('empty-cell');
                }
                calGrid.appendChild(cel);
            }
        }

        function renderWorkoutLogs() {
            const titleEl = document.getElementById('health-selected-date-title');
            const listEl = document.getElementById('health-list');
            if (!healthSelectedDate) {
                titleEl.innerText = '날짜를 선택하세요';
                listEl.innerHTML = '';
                return;
            }
            titleEl.innerText = healthSelectedDate + ' 운동 기록';
            listEl.innerHTML = '';

            // [수정] '이전 날짜 기록 불러오기' 버튼 생성 로직 완전 삭제

            if (!healthData[healthSelectedDate]) {
                // [수정] 기본 2종목, 각 종목당 기본 4세트 칸 생성
                healthData[healthSelectedDate] = Array(2).fill(null).map(() => ({ name: '', weights: ['', '', '', ''] }));
            }
            const workouts = healthData[healthSelectedDate];
            // Migrate old data format (single weight string -> array)
            workouts.forEach(w => {
                if (!Array.isArray(w.weights)) {
                    w.weights = w.weight ? [w.weight, '', '', ''] : ['', '', '', ''];
                    delete w.weight;
                }
            });

            workouts.forEach((workout, index) => {
                const liContainer = document.createElement('div');
                liContainer.className = 'todo-item-container';

                // Delete button (swipe)
                const deleteBtn = document.createElement('div');
                deleteBtn.className = 'todo-delete-btn';
                deleteBtn.innerText = '삭제';
                deleteBtn.onclick = () => {
                    workouts.splice(index, 1);
                    saveHealth();
                    renderWorkoutLogs();
                    renderHealthCalendar();
                };

                const li = document.createElement('li');
                li.className = 'todo-item';
                li.style.flexDirection = 'column';
                li.style.alignItems = 'stretch';
                li.style.padding = '8px 10px';

                // Swipe-to-delete logic (refined)
                let liTouchStartX = 0, liTouchStartY = 0, liIsSwiping = false, liSwipeDirectionDetermined = false;
                li.addEventListener('touchstart', (e) => {
                    // [추가] 현재 입력창에 포커스가 가 있다면 슬라이드 무시
                    if (document.activeElement.tagName === 'INPUT') {
                        liIsSwiping = false;
                        return;
                    }

                    // 어느 자식 요소(input 등)에서 시작해도 좌표를 고정
                    liTouchStartX = e.touches[0].clientX;
                    liTouchStartY = e.touches[0].clientY;
                    liIsSwiping = true;
                    liSwipeDirectionDetermined = false;
                    li.style.transition = 'none';
                }, { passive: true });

                li.addEventListener('touchmove', (e) => {
                    // [추가] 포커스 상태이거나 스와이프가 비활성화된 경우 차단
                    if (!liIsSwiping || document.activeElement.tagName === 'INPUT') return;

                    const currentX = e.touches[0].clientX;
                    const currentY = e.touches[0].clientY;
                    const deltaX = currentX - liTouchStartX;
                    const deltaY = currentY - liTouchStartY;

                    // 가로 5px 이상 움직이면 슬라이드 모드 판정
                    if (!liSwipeDirectionDetermined) {
                        if (Math.abs(deltaX) > 5 && Math.abs(deltaX) > Math.abs(deltaY)) {
                            liSwipeDirectionDetermined = true;
                        } else if (Math.abs(deltaY) > 5) {
                            liIsSwiping = false; // 세로 스크롤로 판단
                            return;
                        }
                    }

                    if (liSwipeDirectionDetermined) {
                        // 슬라이드 중에는 입력창 포커스나 클릭이 무시되도록 차단
                        if (e.cancelable) e.preventDefault(); 
                        
                        // 왼쪽으로 밀기 (최대 -80px)
                        const moveX = Math.min(0, Math.max(deltaX, -80));
                        li.style.transform = `translateX(${moveX}px)`;
                        deleteBtn.style.opacity = Math.abs(moveX) / 80;
                    }
                }, { passive: false });

                li.addEventListener('touchend', (e) => {
                    if (!liIsSwiping) return;
                    
                    // 슬라이드가 실제 발생했다면 클릭 이벤트가 input으로 전달되지 않게 차단
                    if (liSwipeDirectionDetermined) {
                        e.preventDefault();
                    }

                    liIsSwiping = false;
                    const finalDeltaX = e.changedTouches[0].clientX - liTouchStartX;

                    li.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                    if (finalDeltaX < -40) {
                        li.style.transform = 'translateX(-70px)';
                        
                        // 다른 곳 터치 시 닫히는 로직
                        const closeSwipe = (evt) => {
                            if (!liContainer.contains(evt.target)) {
                                li.style.transform = `translateX(0)`;
                                deleteBtn.style.opacity = '0';
                                document.removeEventListener('touchstart', closeSwipe);
                            }
                        };
                        setTimeout(() => document.addEventListener('touchstart', closeSwipe), 50);
                    } else {
                        li.style.transform = 'translateX(0)';
                        deleteBtn.style.opacity = '0';
                    }
                }, { passive: false });

                // Top row: set number + exercise name
                const topRow = document.createElement('div');
                topRow.style.cssText = 'display:flex;align-items:center;gap:5px;margin-bottom:5px;';

                const setLabel = document.createElement('span');
                setLabel.style.cssText = 'font-size:13px;color:#e74c3c;min-width:22px;font-weight:bold;';
                setLabel.innerText = `${index + 1}.`;

                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.className = 'todo-input';
                nameInput.style.cssText = 'flex:1;font-weight:600;font-size:14px;';
                nameInput.value = workout.name || '';
                nameInput.placeholder = '종목';
                nameInput.onblur = (e) => {
                    workout.name = e.target.value;
                    saveHealth();
                    renderHealthCalendar();
                };
                nameInput.onkeydown = (e) => { if (e.key === 'Enter') nameInput.blur(); };

                // input 요소 자체에도 이벤트 추가 (클릭 시 슬라이드 초기화)
                nameInput.addEventListener('focus', () => {
                    li.style.transition = 'transform 0.3s ease';
                    li.style.transform = 'translateX(0)';
                    deleteBtn.style.opacity = '0';
                    liIsSwiping = false;
                });

                topRow.appendChild(setLabel);
                topRow.appendChild(nameInput);

                // Bottom row: multiple weight/reps input boxes
                const bottomRow = document.createElement('div');
                // 무조건 한 줄 유지 및 가로 스크롤 활성화
                bottomRow.style.cssText = `
                    display: flex; 
                    align-items: center; 
                    gap: 12px; 
                    padding: 15px 0 15px 40px;
                    overflow-x: auto; 
                    white-space: nowrap;
                    width: 100%;
                    -webkit-overflow-scrolling: touch;
                `;

                // 1. 기본 4세트 보장 (데이터가 4개 미만이면 강제로 4개 생성)
                if (!workout.weights || workout.weights.length < 4) {
                    workout.weights = workout.weights || [];
                    while (workout.weights.length < 4) {
                        workout.weights.push(''); 
                    }
                }

                // 2. 세트 박스 생성 (1.5배 사이즈)
                workout.weights.forEach((w, wIdx) => {
                    const wInput = document.createElement('input');
                    wInput.type = 'text';
                    wInput.placeholder = `${wIdx + 1}세트`;
                    wInput.value = w || '';
                    wInput.style.cssText = `
                        width: 68px; 
                        min-width: 68px; 
                        height: 45px; 
                        text-align: center; 
                        font-size: 13px; 
                        font-weight: 700;
                        border: 2px solid #ddd; 
                        border-radius: 10px; 
                        background: #fff;
                        flex-shrink: 0;
                    `;
                    wInput.oninput = (e) => {
                        workout.weights[wIdx] = e.target.value;
                        saveHealth();
                    };
                    bottomRow.appendChild(wInput);
                });

                // 3. [+] 버튼 (클릭 영역 및 이벤트 보강)
                const addSetBtn = document.createElement('button');
                addSetBtn.innerHTML = '+';
                addSetBtn.type = 'button'; // 폼 제출 방지
                addSetBtn.style.cssText = `
                    width: 45px; 
                    min-width: 45px;
                    height: 45px; 
                    border-radius: 10px; 
                    border: 2px dashed #999; 
                    background: #eee; 
                    color: #333; 
                    font-size: 24px; 
                    font-weight: bold;
                    cursor: pointer;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    flex-shrink: 0;
                    margin-right: 20px; /* 마지막 버튼 뒤 여백 */
                `;

                // [긴급 수정] 모든 환경에서 동작하도록 이벤트 핸들러 통합
                const handleAddSet = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    // 현재 데이터가 유효한지 확인 후 배열 확장
                    if (!workout.weights) workout.weights = [];
                    workout.weights.push(''); 
                    
                    saveHealth();         // 데이터 저장 (localStorage 등)
                    renderWorkoutLogs();  // 화면 즉시 리렌더링
                };

                // 클릭과 터치 이벤트를 동시에 지원
                addSetBtn.onclick = handleAddSet;
                addSetBtn.addEventListener('touchend', handleAddSet, { passive: false });

                bottomRow.appendChild(addSetBtn);
                li.appendChild(topRow);
                li.appendChild(bottomRow);

                // Add drag handle for exercises
                const handle = document.createElement('div');
                handle.className = 'drag-handle';
                handle.style.position = 'absolute';
                handle.style.left = '0px';
                handle.style.top = '10px';
                handle.innerHTML = '⠿';
                li.appendChild(handle);
                li.style.paddingLeft = '25px';
                li.setAttribute('data-index', index);

                liContainer.appendChild(deleteBtn);
                liContainer.appendChild(li);
                listEl.appendChild(liContainer);
            });

            // Initialize Sortable for Health Exercises
            new Sortable(listEl, {
                animation: 150,
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: (evt) => {
                    const items = Array.from(listEl.querySelectorAll('.todo-item-container .todo-item'));
                    const newOrder = items.map(item => {
                        const idx = parseInt(item.getAttribute('data-index'));
                        return healthData[healthSelectedDate][idx];
                    });
                    healthData[healthSelectedDate] = newOrder;
                    saveHealth();
                    renderWorkoutLogs();
                    renderHealthCalendar();
                }
            });

            // Add exercise button
            const addBtn = document.createElement('button');
            addBtn.className = 'btn btn-primary';
            addBtn.style.cssText = 'width:100%;margin-top:10px;padding:10px;font-size:14px;border-radius:10px;';
            addBtn.innerText = '+ 종목 추가';
            addBtn.onclick = () => {
                workouts.push({ name: '', weights: ['', '', '', '', ''] });
                saveHealth();
                renderWorkoutLogs();
            };
            listEl.appendChild(addBtn);
        }

        window.changeHealthMonth = function (delta, isFromSwipe = false, currentSwipeX = 0) {
            console.log('changeHealthMonth called:', { delta, isFromSwipe, isMonthAnimating });
            if (isMonthAnimating) return;
            isMonthAnimating = true;

            // Safety reset
            setTimeout(() => {
                console.log('Safety reset for isMonthAnimating (Health)');
                isMonthAnimating = false;
            }, 600);

            const grid = document.getElementById('health-calendar');
            const direction = delta > 0 ? -1 : 1;
            grid.style.transition = 'transform 0.2s ease-in, opacity 0.2s';
            if (isFromSwipe) {
                const exitX = delta > 0 ? (currentSwipeX - window.innerWidth / 2) : (currentSwipeX + window.innerWidth / 2);
                grid.style.transform = `translateX(${exitX}px)`;
            } else {
                grid.style.transform = `translateX(${direction * 30}%)`;
            }
            grid.style.opacity = '0';
            setTimeout(() => {
                calHealthMonth += delta;
                if (calHealthMonth > 11) { calHealthMonth = 0; calHealthYear++; }
                else if (calHealthMonth < 0) { calHealthMonth = 11; calHealthYear--; }
                renderHealthCalendar();
                grid.style.transition = 'none';
                grid.style.transform = `translateX(${-direction * 30}%)`;
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        grid.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease-out';
                        grid.style.transform = 'translateX(0)';
                        grid.style.opacity = '1';
                        setTimeout(() => { grid.style.transition = ''; }, 300);
                    });
                });
            }, 200);
        };

        window.goToHealthToday = function () {
            const now = new Date();
            calHealthYear = now.getFullYear();
            calHealthMonth = now.getMonth();
            healthSelectedDate = `${calHealthYear}-${String(calHealthMonth + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            renderHealthCalendar();
            renderWorkoutLogs();
        };

        // Health calendar swipe
        const healthCalEl = document.getElementById('health-calendar');
        healthCalEl.addEventListener('touchstart', e => {
            if (isMonthAnimating) return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            touchCurrentX = touchStartX;
            isSwiping = true;
            swipeDirectionDetermined = false;
            healthCalEl.style.transition = 'none';
        }, { passive: true });
        healthCalEl.addEventListener('touchmove', e => {
            if (!isSwiping || isMonthAnimating) return;
            const currentY = e.changedTouches[0].screenY;
            touchCurrentX = e.changedTouches[0].screenX;
            const deltaX = touchCurrentX - touchStartX;
            const deltaY = currentY - touchStartY;
            if (!swipeDirectionDetermined) {
                if (Math.abs(deltaY) > Math.abs(deltaX)) {
                    isSwiping = false;
                    healthCalEl.style.transform = '';
                    return;
                }
                swipeDirectionDetermined = true;
            }
            if (e.cancelable) e.preventDefault();
            healthCalEl.style.transform = `translateX(${deltaX}px)`;
        }, { passive: false });
        healthCalEl.addEventListener('touchend', e => {
            if (!isSwiping || isMonthAnimating) return;
            isSwiping = false;
            const deltaX = touchCurrentX - touchStartX;
            const swipeThreshold = 50;
            if (deltaX < -swipeThreshold) {
                changeHealthMonth(1, true, deltaX);
            } else if (deltaX > swipeThreshold) {
                changeHealthMonth(-1, true, deltaX);
            } else {
                healthCalEl.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                healthCalEl.style.transform = 'translateX(0)';
                setTimeout(() => { healthCalEl.style.transition = ''; }, 300);
            }
        }, { passive: true });


        // Init
        // Close palette if clicked outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.color-picker-wrapper')) {
                document.querySelectorAll('.palette-popup').forEach(p => p.classList.remove('show'));
                activePaletteId = null;
            }
        });

        // Init Block (Function already moved up, but actually it's fine)
        // 초기화 함수 보강
        function initializeApp() {
            if (appInitialized) return;
            console.log('앱 초기화 실행 중...');
            renderCalendar();
            renderTodos();
            renderHealthCalendar();
            renderWorkoutLogs();
            appInitialized = true;
        }

        // 인증 상태 감시 (로그인 성공 시 실제 화면을 전환하는 엔진)
        auth.onAuthStateChanged(async (user) => {
            const overlay = document.getElementById('auth-overlay');
            console.log("인증 상태 변경 감지됨:", user ? "로그인 상태" : "로그아웃 상태");

            if (user) {
                currentUser = user;

                // 1. 데이터 먼저 불러오기 (async/await로 순서 보장)
                try {
                    await loadCloudData();
                    console.log("데이터 로드 완료");
                } catch (e) {
                    console.error("데이터 로드 중 오류:", e);
                }

                // 2. 화면 초기화 및 탭 전환 (달력 그리기)
                appInitialized = false; // 초기화 강제 리셋
                initializeApp();
                switchView('schedule');

                // 3. 마지막에 로그인창 숨기기 (모든 준비가 끝난 후)
                if (overlay) {
                    overlay.style.opacity = '0';
                    overlay.style.pointerEvents = 'none'; // 클릭이 통과되도록 추가
                    setTimeout(() => {
                        overlay.setAttribute('style', 'display: none !important'); // 강제로 display none 주입
                        console.log("로그인 오버레이 물리적 제거 완료");
                    }, 300);
                }
            } else {
                currentUser = null;
                appInitialized = false;
                if (overlay) {
                    overlay.style.display = 'flex';
                    overlay.style.opacity = '1';
                }
            }
        });

        // 하단 메뉴 스크롤 이벤트 최종 최적화
        let lastScrollY = window.scrollY;
        let ticking = false; // 브라우저 부하 방지용 플래그
        let isMenuHidden = false;

        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const bottomMenu = document.querySelector('.bottom-menu');
                    const currentScrollY = window.scrollY;
                    
                    // 1. 위아래 방향성 판단
                    const scrollingDown = currentScrollY > lastScrollY;
                    
                    // 2. 상태 변화가 필요할 때만 클래스 조작 (불필요한 DOM 접근 차단)
                    if (scrollingDown && currentScrollY > 60) {
                        if (!isMenuHidden) {
                            bottomMenu.classList.add('hidden');
                            isMenuHidden = true;
                        }
                    } else {
                        if (isMenuHidden) {
                            bottomMenu.classList.remove('hidden');
                            isMenuHidden = false;
                        }
                    }

                    lastScrollY = currentScrollY;
                    ticking = false;
                });
                ticking = true;
            }
        }, { passive: true });

        // 반복 삭제 모달 제어 로직 보강
        document.addEventListener('DOMContentLoaded', () => {
            const btnSingle = document.getElementById('btn-delete-single');
            const btnAll = document.getElementById('btn-delete-all');

            if (btnSingle) {
                btnSingle.onclick = () => {
                    console.log("단일 삭제 클릭됨"); // 디버깅용
                    if (currentDeleteRoutineDate && currentDeleteRoutineIndex !== null) {
                        scheduleData[currentDeleteRoutineDate].splice(currentDeleteRoutineIndex, 1);
                        saveSchedule();
                        renderTodos();
                        renderCalendar();
                        closeRoutineDeleteModal();
                    }
                };
            }

            if (btnAll) {
                btnAll.onclick = () => {
                    console.log("전체 삭제 클릭됨");
                    if (currentDeleteRoutineDate && currentDeleteRoutineIndex !== null) {
                        const targetTask = scheduleData[currentDeleteRoutineDate][currentDeleteRoutineIndex];
                        const routineId = targetTask.routineId;
                        if (routineId) {
                            for (const date in scheduleData) {
                                scheduleData[date] = scheduleData[date].filter(t => t.routineId !== routineId);
                            }
                            saveSchedule();
                            renderTodos();
                            renderCalendar();
                        }
                        closeRoutineDeleteModal();
                    }
                };
            }
        });
    </script>
