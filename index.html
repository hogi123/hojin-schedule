<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Schedule App</title>
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2370/2370264.png">

    <!-- Firebase SDK (Compat versions for simple integration) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --text-color: #333;
            --range-color: #1abc9c;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: 1px solid rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --glass-blur: blur(16px);
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-y: auto;
            /* Clean, Transparent iOS-style Mesh Gradient */
            background-color: #f5f7fa;
            background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            /* Prevent horizontal page shaking on swipe */
        }

        .main-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 480px;

            /* Glassmorphism Main Body */
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-left: var(--glass-border);
            border-right: var(--glass-border);
            box-shadow: var(--glass-shadow);

            position: relative;
            min-height: 100vh;
            border-radius: 0;
        }

        #schedule-view {
            display: flex;
            flex-direction: column;
            width: 100%;
            flex: 1;
            padding-bottom: 90px;
        }

        #settings-view {
            width: 100%;
            height: 100%;
            display: none;
            padding: 20px;
            background: transparent;
            box-sizing: border-box;
            overflow-y: auto;
            padding-bottom: 70px;
        }

        /* Calendar Section (Top Half) */
        .calendar-section {
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
            padding: 10px;
            display: flex;
            flex-direction: column;
            background: transparent;
            user-select: none;
            overflow-x: hidden;
            /* Prevent horizontal container stretching */
        }

        .calendar-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .calendar-header h2 {
            margin: 0;
            font-size: 20px;
            color: #444;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
        }

        .calendar-nav button {
            background: none;
            border: 1px solid #eee;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 5px;
            color: #666;
            transition: all 0.2s;
        }

        .calendar-nav button:hover {
            background-color: #f0f0f0;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* Memo (Glassmorphism) */
        .memo-wrapper {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 10px;
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
            /* Allow goals to wrap instead of forcing width */
            align-items: center;
            gap: 5px;
        }

        .memo-title {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            /* removed nowrap to allow squeezing */
        }

        .memo-lines {
            display: flex;
            flex-grow: 1;
            gap: 10px;
            overflow-x: auto;
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .memo-lines::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari and Opera */
        }

        .memo-line {
            display: flex;
            min-width: 60px;
            /* Reduced to stop pushing the layout wide */
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            padding: 4px 8px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .memo-line input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 13px;
            color: #333;
            width: 100%;
            min-width: 0;
            /* Let it shrink on mobile */
        }

        /* Calendar Grid - No Gaps */
        .calendar-grid {
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 0;
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 5px;
            padding-bottom: 20px;
            border-top: var(--glass-border);
            border-left: var(--glass-border);
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .calendar-grid::-webkit-scrollbar {
            display: none;
        }

        .day-header {
            text-align: center;
            padding: 5px 2px;
            font-weight: 600;
            color: #222;
            font-size: 13px;
            border-right: var(--glass-border);
            border-bottom: var(--glass-border);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .day-header.sunday {
            color: #e74c3c;
        }

        .day-header.saturday {
            color: #3498db;
        }

        .calendar-cell {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 0;
            height: 60px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
            border-right: var(--glass-border);
            border-bottom: var(--glass-border);
            overflow: hidden;
        }

        .calendar-cell:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .calendar-cell.selected {
            background-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 0 2px var(--primary-color) inset;
            z-index: 10;
        }

        .calendar-cell.today {
            background-color: rgba(255, 250, 208, 0.5);
        }

        .day-number-container {
            display: flex;
            justify-content: center;
            width: 100%;
            padding-top: 5px;
        }

        .day-number {
            font-weight: 600;
            font-size: 14px;
            color: #555;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            z-index: 2;
        }

        .mark-circle {
            border: 2px solid #e74c3c;
            color: #e74c3c;
            font-weight: bold;
            background: white;
            width: 18px;
            /* Slightly smaller diameter */
            height: 18px;
            font-size: 12px;
            /* Adjust font to fit */
        }

        .mark-x {
            position: relative;
            color: #95a5a6;
        }

        .mark-x::after,
        .mark-x::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: #e74c3c;
            top: 50%;
            left: 0;
        }

        .mark-x::after {
            transform: rotate(45deg);
        }

        .mark-x::before {
            transform: rotate(-45deg);
        }

        .events-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: hidden;
            padding-top: 2px;
        }

        .event-pill {
            font-size: 11px;
            padding: 2px 4px;
            /* Slightly tighter */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
            margin: 0 2px;
            border-radius: 3px;
            min-width: 0;
            /* Crucial for shrinking inside grid */
        }

        /* Todo List Panel (Bottom Half) */
        .right-panel {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            border-top: var(--glass-border);
        }

        .todo-wrapper {
            display: flex;
            flex-direction: column;
        }

        .todo-header {
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: var(--glass-border);
        }

        .selected-date-display {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .todo-item-container {
            position: relative;
            width: 100%;
            margin-bottom: 8px;
            border-radius: 8px;
            background-color: transparent;
            touch-action: pan-y;
            /* Prevent native horizontal drag/navigation */
        }

        .todo-item {
            display: flex;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            min-width: 0;
            position: relative;
            z-index: 2;
            transition: transform 0.2s ease-out;
            touch-action: pan-y;
            /* Crucial: stop iOS horizontal scroll dragging */

            /* Combined Glassmorphism & Layout */
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.5);
            border: var(--glass-border);
            border-left: 4px solid #eee;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .todo-delete-btn {
            position: absolute;
            top: 0;
            right: 0;
            background-color: #ff3b30;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.2s;
            /* Occupies full height and width behind the main item */
            width: 100%;
            height: 100%;
            border-radius: 8px;
            /* Match container radius since overflow is no longer hidden */
        }

        .todo-item.dragging {
            opacity: 0.5;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0px;
            /* Margins handled by container */
            flex: 1;
            overflow-y: auto;
        }

        .todo-item:active {
            cursor: grabbing;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.6);
        }

        .todo-item.dragging {
            opacity: 0.5;
        }

        .todo-checkbox {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .todo-input {
            flex-grow: 1;
            border: none;
            font-size: 16px;
            padding: 8px 5px;
            font-family: inherit;
            background: transparent;
            min-width: 0;
            color: #333;
            width: 100%;
        }

        .todo-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
        }

        .todo-input.completed {
            text-decoration: line-through;
            color: #aaa;
        }

        /* Custom Color Swatch Palette CSS */
        .color-picker-wrapper {
            position: relative;
            display: inline-block;
            margin-left: 10px;
        }

        .swatch-trigger {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px #ddd;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .swatch-trigger:hover {
            transform: scale(1.1);
        }

        .palette-popup {
            display: none;
            /* Hidden by default */
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 5px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            padding: 10px;
            z-index: 9999;
            width: 140px;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .palette-popup.show {
            display: grid;
        }

        .palette-color-item {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: transform 0.1s;
        }

        .palette-color-item:hover {
            transform: scale(1.2);
            border: 1px solid #333;
        }

        /* Bottom Menu (iOS Style) */
        .bottom-menu {
            height: 70px;
            padding-bottom: 20px;

            /* Glassmorphism Navigation */
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: var(--glass-border);
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.05);

            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            /* Changed to fixed so it stays at the bottom of the screen */
            bottom: 0;
            width: 100%;
            max-width: 480px;
            /* Match main-content width */
            z-index: 1000;
            transition: transform 0.3s ease-in-out;
        }

        .bottom-menu.hidden {
            transform: translateY(100%);
        }

        .menu-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #8e8e93;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .menu-item:hover,
        .menu-item.active {
            color: var(--primary-color);
            background-color: transparent;
        }

        /* Settings CSS */
        .settings-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .settings-container h2 {
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .setting-item {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 18px;
        }

        .setting-item input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            cursor: pointer;
        }

        .danger-zone {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px dotted #ccc;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .auth-card h2 {
            margin: 0;
            color: var(--primary-color);
        }

        .auth-card p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .auth-input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            width: 100%;
        }

        .auth-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-secondary {
            background: #eee;
            color: #333;
        }

        .auth-btn:hover {
            opacity: 0.8;
        }

        .auth-error {
            color: #e74c3c;
            font-size: 13px;
            min-height: 18px;
        }

        /* Routine Bottom Sheet Modal */
        #routine-modal {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;

            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: var(--glass-border);

            border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            z-index: 2000;
            transition: bottom 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 24px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #routine-modal.show {
            bottom: 0;
        }

        .routine-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--glass-border);
            padding-bottom: 10px;
        }

        .routine-header h3 {
            margin: 0;
            color: var(--primary-color);
        }

        .routine-close {
            cursor: pointer;
            font-size: 20px;
            color: #999;
        }

        .routine-form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .routine-form-group label {
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }

        .routine-form-group input,
        .routine-form-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }

        /* Routine Toggle Button */
        .routine-trigger-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            color: #888;
            transition: transform 0.2s, color 0.2s;
            margin-right: 5px;
        }

        .routine-trigger-btn:hover {
            color: var(--primary-color);
            transform: rotate(90deg);
        }

        /* Dim Background for Modal */
        #dim-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1999;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #dim-overlay.show {
            display: block;
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="main-content">
        <!-- Schedule View -->
        <div id="schedule-view">
            <div class="calendar-section">
                <div class="calendar-header">
                    <div class="header-left">
                        <h2 id="current-month">2026년 1월</h2>
                        <div class="calendar-nav">
                            <button onclick="changeMonth(-1)">&lt;</button>
                            <button onclick="goToToday()">Today</button>
                            <button onclick="changeMonth(1)">&gt;</button>
                        </div>
                    </div>

                    <div class="memo-wrapper">
                        <h3 class="memo-title" id="memo-month-title">1월 목표</h3>
                        <div class="memo-lines" id="memo-lines"></div>
                    </div>
                </div>

                <div class="calendar-grid" id="calendar">
                    <!-- Days generated by JS -->
                </div>
            </div>

            <div class="right-panel">
                <div class="todo-wrapper">
                    <div class="todo-header">
                        <div class="selected-date-display" id="selected-date-title">날짜를 선택하세요</div>
                    </div>
                    <ul class="todo-list" id="todo-list"></ul>
                </div>
            </div>
        </div>

        <!-- Settings View -->
        <div id="settings-view" style="display: none;">
            <div class="settings-container">
                <h2>설정 (MY)</h2>
                <div class="setting-item">
                    <label>기본 할일 색상</label>
                    <div class="color-picker-wrapper" id="settings-color-wrapper">
                        <div class="swatch-trigger" id="setting-default-color-trigger"
                            style="background-color: #ffb3ba;" onclick="togglePalette('settings-palette')"></div>
                        <div class="palette-popup" id="settings-palette">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
                <div style="margin-top: 30px; text-align: right;">
                    <button onclick="saveSettings()" class="btn btn-primary">변경사항 저장</button>
                </div>

                <div class="setting-item">
                    <label>현재 달(月) 할 일 초기화</label>
                    <button onclick="clearCurrentMonth()" class="btn btn-danger">초기화</button>
                </div>

                <div class="danger-zone" style="text-align: center; margin-top: 50px;">
                    <button onclick="handleLogout()" class="btn btn-secondary" style="width: 100%;">로그아웃 (계정
                        전환)</button>
                </div>
            </div>
        </div>

        <!-- Auth Overlay -->
        <div id="auth-overlay">
            <div class="auth-card">
                <h2>Hojin Schedule</h2>
                <p>Login to sync your data across devices</p>
                <div id="auth-error" class="auth-error"></div>
                <input type="email" id="auth-email" class="auth-input" placeholder="Email (ex: test@test.com)">
                <input type="password" id="auth-password" class="auth-input" placeholder="Password (min 6 chars)">
                <button class="auth-btn btn-primary" onclick="handleLogin()">로그인</button>
                <button class="auth-btn btn-secondary" onclick="handleSignup()">회원가입</button>
            </div>
        </div>
    </div>

    <!-- Dim Overlay -->
    <div id="dim-overlay" onclick="closeRoutineModal()"></div>

    <!-- Routine Modal -->
    <div id="routine-modal">
        <div class="routine-header">
            <h3>반복 루틴 설정</h3>
            <span class="routine-close" onclick="closeRoutineModal()">✕</span>
        </div>

        <div class="routine-form-group">
            <label>기준 날짜 (시작일)</label>
            <input type="date" id="routine-start-date">
        </div>

        <div class="routine-form-group">
            <label>종료 날짜</label>
            <input type="date" id="routine-end-date">
        </div>

        <div class="routine-form-group">
            <label>반복 주기</label>
            <select id="routine-frequency">
                <option value="1">매일 (Daily)</option>
                <option value="2">격일 (Every 2 days)</option>
                <option value="7">매주 (Weekly)</option>
                <option value="14">격주 (Bi-weekly)</option>
            </select>
        </div>

        <button class="btn btn-primary" style="margin-top: 10px;" onclick="applyRoutine()">루틴 생성하기</button>
    </div>

    <nav class="bottom-menu">
        <a class="menu-item active" id="nav-schedule" onclick="switchTab('schedule-view')">
            <span style="font-size: 24px; margin-bottom: 5px;">📅</span>
            <span>스케줄</span>
        </a>
        <a class="menu-item" id="nav-settings" onclick="switchTab('settings-view')">
            <span style="font-size: 24px; margin-bottom: 5px;">⚙️</span>
            <span>설정 (MY)</span>
        </a>
    </nav>
    </div>

    <script>
        // ====== Firebase Setup ======
        const firebaseConfig = {
            apiKey: "AIzaSyDPRFTO7qYhlJJyjOfb-8nsR7OLmyqVV9U",
            authDomain: "hojin-schedule.firebaseapp.com",
            projectId: "hojin-schedule",
            storageBucket: "hojin-schedule.firebasestorage.app",
            messagingSenderId: "38268072154",
            appId: "1:38268072154:web:c73f3ce19d42abdfe175e3",
            measurementId: "G-LWXJWBR9FM"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;

        // ====== Auth UI Logic ======
        const authOverlay = document.getElementById('auth-overlay');
        const authEmailInput = document.getElementById('auth-email');
        const authPwdInput = document.getElementById('auth-password');
        const authError = document.getElementById('auth-error');

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                authOverlay.style.opacity = '0';
                setTimeout(() => authOverlay.style.display = 'none', 300);
                loadCloudData(); // Load user data from Firestore
            } else {
                currentUser = null;
                authOverlay.style.display = 'flex';
                setTimeout(() => authOverlay.style.opacity = '1', 10);
            }
        });

        async function handleLogin() {
            authError.innerText = '';
            try {
                await auth.signInWithEmailAndPassword(authEmailInput.value, authPwdInput.value);
            } catch (error) {
                authError.innerText = error.message;
            }
        }

        async function handleSignup() {
            authError.innerText = '';
            try {
                await auth.createUserWithEmailAndPassword(authEmailInput.value, authPwdInput.value);
            } catch (error) {
                authError.innerText = error.message;
            }
        }

        function handleLogout() {
            auth.signOut();
            // Clear local states
            scheduleData = {};
            memoData = {};
            dateMarks = {};
            localStorage.clear();
            renderCalendar();
            renderTodos();
            renderMemos();
            switchView('schedule');
        }

        async function loadCloudData() {
            if (!currentUser) return;
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    scheduleData = data.scheduleData || {};
                    memoData = data.memoData || {};
                    dateMarks = data.dateMarks || {};
                    if (data.defaultColor) defaultColor = data.defaultColor;

                    // Sync to local
                    localStorage.setItem('scheduleData', JSON.stringify(scheduleData));
                    localStorage.setItem('memoData', JSON.stringify(memoData));
                    localStorage.setItem('dateMarks', JSON.stringify(dateMarks));
                    localStorage.setItem('defaultColor', defaultColor);
                }
                renderCalendar();
                renderMemos();
                if (selectedDate) renderTodos();
            } catch (e) {
                console.error("Error loading cloud data:", e);
            }
        }

        // Data & State - Organized Pastel Colors
        const PRESET_COLORS = [
            // Row 1: Pinks & Reds
            '#ffe4e1', '#ffc0cb', '#ffb6c1', '#f8bbd0', '#f48fb1',
            // Row 2: Oranges & Yellows
            '#fff3e0', '#ffe0b2', '#ffccbc', '#fff9c4', '#fff59d',
            // Row 3: Greens & Mints
            '#f1f8e9', '#dcedc8', '#e8f5e9', '#c8e6c9', '#e0f2f1',
            // Row 4: Blues & Purples
            '#e3f2fd', '#bbdefb', '#e0f7fa', '#f3e5f5', '#e1bee7'
        ];

        let currentYear = 2026;
        let currentMonth = 0;
        let selectedDate = null;
        let activePaletteId = null; // Track open palette
        let currentRoutineTaskIndex = null; // Track which task is opening the routine modal

        // Close palette if clicked outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.color-picker-wrapper')) {
                document.querySelectorAll('.palette-popup').forEach(p => p.classList.remove('show'));
                activePaletteId = null;
            }
        });

        let defaultColor = localStorage.getItem('defaultColor') || '#ffb3ba';
        let scheduleData = JSON.parse(localStorage.getItem('scheduleData')) || {};
        let memoData = JSON.parse(localStorage.getItem('memoData')) || {};
        let dateMarks = JSON.parse(localStorage.getItem('dateMarks')) || {};

        // Initialize Settings Palette
        document.addEventListener('DOMContentLoaded', () => {
            const settingsPalette = document.getElementById('settings-palette');
            const settingsTrigger = document.getElementById('setting-default-color-trigger');

            PRESET_COLORS.forEach(colorHex => {
                const swatch = document.createElement('div');
                swatch.className = 'palette-color-item';
                swatch.style.backgroundColor = colorHex;
                swatch.onclick = (e) => {
                    e.stopPropagation();
                    defaultColor = colorHex;
                    settingsTrigger.style.backgroundColor = colorHex;
                    settingsPalette.classList.remove('show');
                    activePaletteId = null;
                };
                settingsPalette.appendChild(swatch);
            });

            settingsTrigger.style.backgroundColor = defaultColor;
        });

        // Save Logic (Dual Save: Local + Cloud)
        function syncToCloud() {
            if (!currentUser) return;
            db.collection('users').doc(currentUser.uid).set({
                scheduleData: scheduleData,
                memoData: memoData,
                dateMarks: dateMarks,
                defaultColor: defaultColor
            }, { merge: true }).catch(e => console.error("Sync error:", e));
        }

        function saveSchedule() {
            localStorage.setItem('scheduleData', JSON.stringify(scheduleData));
            syncToCloud();
        }
        function saveMemo() {
            localStorage.setItem('memoData', JSON.stringify(memoData));
            syncToCloud();
        }
        function saveMarks() {
            localStorage.setItem('dateMarks', JSON.stringify(dateMarks));
            syncToCloud();
        }

        function saveSettings() {
            localStorage.setItem('defaultColor', defaultColor);
            syncToCloud();
            renderCalendar();
            renderTodos();
            alert("저장되었습니다.");
        }

        function clearCurrentMonth() {
            if (!confirm(`${currentYear}년 ${currentMonth + 1}월의 모든 할 일 데이터를 초기화하시겠습니까?`)) return;

            // Clear days belonging to current month
            const yearMonthStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            Object.keys(scheduleData).forEach(key => {
                if (key.startsWith(yearMonthStr)) delete scheduleData[key];
            });

            // Clear memo for current month
            delete memoData[yearMonthStr];

            saveSchedule();
            saveMemo();
            renderCalendar();
            if (selectedDate && selectedDate.startsWith(yearMonthStr)) {
                renderTodos();
            }
            renderMemos();
            alert(`${currentYear}년 ${currentMonth + 1}월 초기화 완료`);
        }

        function switchView(viewName) {
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            document.getElementById('schedule-view').style.display = 'none';
            document.getElementById('settings-view').style.display = 'none';

            if (viewName === 'schedule') {
                document.getElementById('schedule-view').style.display = 'flex';
                document.getElementById('menu-schedule').classList.add('active');
            } else if (viewName === 'settings') {
                document.getElementById('settings-view').style.display = 'block';
                document.getElementById('menu-settings').classList.add('active');
            }
        }

        // Multi-click
        let clickCounts = {};
        let clickTimers = {};

        function onCellClick(e, dateStr) {
            if (e.target.tagName.toLowerCase() === 'input') return; // Ignore input clicks

            // Immediately switch the right panel view
            selectDate(dateStr);

            clickCounts[dateStr] = (clickCounts[dateStr] || 0) + 1;
            if (clickTimers[dateStr]) clearTimeout(clickTimers[dateStr]);

            clickTimers[dateStr] = setTimeout(() => {
                let count = clickCounts[dateStr];
                clickCounts[dateStr] = 0;

                if (count === 2) {
                    if (dateMarks[dateStr] === 'circle') delete dateMarks[dateStr];
                    else dateMarks[dateStr] = 'circle';
                    saveMarks();
                    renderCalendar();
                } else if (count >= 3) {
                    if (dateMarks[dateStr] === 'x') delete dateMarks[dateStr];
                    else dateMarks[dateStr] = 'x';
                    saveMarks();
                    renderCalendar();
                }
            }, 250);
        }

        // Render Calendar
        function renderCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendarEl.innerHTML = '';

            document.getElementById('current-month').innerText = `${currentYear}년 ${currentMonth + 1}월`;

            const days = ['일', '월', '화', '수', '목', '금', '토'];
            days.forEach((d, index) => {
                const cel = document.createElement('div');
                cel.className = 'day-header';
                if (index === 0) cel.classList.add('sunday');
                if (index === 6) cel.classList.add('saturday');
                cel.innerText = d;
                calendarEl.appendChild(cel);
            });

            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);

            for (let i = 0; i < firstDay.getDay(); i++) {
                const cel = document.createElement('div');
                cel.className = 'calendar-cell empty';
                cel.style.pointerEvents = 'none';
                cel.style.backgroundColor = '#f9f9f9';
                calendarEl.appendChild(cel);
            }

            for (let d = 1; d <= lastDay.getDate(); d++) {
                const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

                const cel = document.createElement('div');
                cel.className = 'calendar-cell';
                if (dateKey === selectedDate) cel.classList.add('selected');

                const now = new Date();
                if (currentYear === now.getFullYear() && currentMonth === now.getMonth() && d === now.getDate()) {
                    cel.classList.add('today');
                }

                let markClass = '';
                if (dateMarks[dateKey] === 'circle') markClass = 'mark-circle';
                else if (dateMarks[dateKey] === 'x') markClass = 'mark-x';

                cel.onclick = (e) => onCellClick(e, dateKey);

                let html = `<div class="day-number-container"><div class="day-number ${markClass}">${d}</div></div><div class="events-container">`;

                const tasks = scheduleData[dateKey] || [];
                tasks.forEach(t => {
                    if (t.text) {
                        let bg = t.color || defaultColor;
                        let fontColor = '#000';
                        let border = `1px solid ${bg}`;
                        let textDecor = t.checked ? 'line-through' : 'none';
                        let opacity = t.checked ? '0.5' : '1';
                        html += `<div class="event-pill" style="background:${bg}; color:${fontColor}; border:${border}; text-decoration:${textDecor}; opacity:${opacity};">${t.text}</div>`;
                    }
                });

                html += `</div>`;
                cel.innerHTML = html;
                calendarEl.appendChild(cel);
            }
        }

        // Render Memos
        function renderMemos() {
            const memoMonthKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            document.getElementById('memo-month-title').innerText = `${currentMonth + 1}월 목표`;

            if (!memoData[memoMonthKey]) {
                memoData[memoMonthKey] = Array(8).fill(''); // Reduced to 8 lines to save space
            }
            const memos = memoData[memoMonthKey];
            const memoLinesEl = document.getElementById('memo-lines');
            memoLinesEl.innerHTML = '';

            memos.forEach((memo, index) => {
                if (index >= 8) return;
                const div = document.createElement('div');
                div.className = 'memo-line';
                const input = document.createElement('input');
                input.type = 'text';
                input.value = memo;
                input.placeholder = `목표 ${index + 1}`;
                input.onblur = (e) => {
                    memoData[memoMonthKey][index] = e.target.value;
                    saveMemo();
                };
                input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };
                div.appendChild(input);
                memoLinesEl.appendChild(div);
            });
        }

        let dragItemIndex = null;

        // Render Todos
        function renderTodos() {
            if (!selectedDate) return;
            document.getElementById('selected-date-title').innerText = selectedDate;
            const todoListEl = document.getElementById('todo-list');
            todoListEl.innerHTML = '';

            if (!scheduleData[selectedDate]) {
                scheduleData[selectedDate] = Array(10).fill().map(() => ({ text: '', checked: false, color: null }));
            }
            const tasks = scheduleData[selectedDate];

            tasks.forEach((task, index) => {
                if (index >= 10) return;

                // Wrapper for Swipe-to-Delete
                const liContainer = document.createElement('div');
                liContainer.className = 'todo-item-container';

                // Delete Button (Background)
                const deleteBtn = document.createElement('div');
                deleteBtn.className = 'todo-delete-btn';
                deleteBtn.innerText = '삭제';
                deleteBtn.onclick = () => {
                    // Check if it's part of a routine
                    if (task.routineId) {
                        showRoutineDeleteModal(selectedDate, index);
                    } else {
                        // Normal delete
                        if (confirm('이 할 일을 삭제하시겠습니까?')) {
                            scheduleData[selectedDate].splice(index, 1);
                            // Add empty task at end to maintain 10 slots
                            scheduleData[selectedDate].push({ text: '', checked: false, color: null });
                            saveSchedule();
                            renderTodos();
                            renderCalendar();
                        }
                    }
                };

                const li = document.createElement('li');
                li.className = 'todo-item';
                li.draggable = true;

                // Swipe Logic
                let liTouchStartX = 0;
                let liTouchStartY = 0;
                let liTouchCurrentX = 0;
                let liIsSwiping = false;
                let liSwipeDirectionDetermined = false;

                li.addEventListener('touchstart', (e) => {
                    liTouchStartX = e.touches[0].clientX;
                    liTouchStartY = e.touches[0].clientY;
                    liIsSwiping = true;
                    liSwipeDirectionDetermined = false;
                    li.style.transition = 'none';
                }, { passive: true });

                li.addEventListener('touchmove', (e) => {
                    if (!liIsSwiping) return;
                    liTouchCurrentX = e.touches[0].clientX;
                    const currentY = e.touches[0].clientY;
                    const deltaX = liTouchCurrentX - liTouchStartX;
                    const deltaY = currentY - liTouchStartY;

                    if (!liSwipeDirectionDetermined) {
                        // If moving more vertically than horizontally, it's a scroll
                        if (Math.abs(deltaY) > Math.abs(deltaX)) {
                            liIsSwiping = false;
                            li.style.transform = 'translateX(0)';
                            deleteBtn.style.opacity = '0';
                            return;
                        }
                        liSwipeDirectionDetermined = true;
                    }

                    // Only horizontal swipes reach here, prevent page bouncy/scrolling
                    if (e.cancelable) e.preventDefault();

                    deleteBtn.style.opacity = '1'; // Show red background only when swiping

                    // Only allow swiping LEFT (negative deltaX) up to -85px
                    if (deltaX < 0 && deltaX > -85) {
                        li.style.transform = `translateX(${deltaX}px)`;
                    } else if (deltaX <= -85) {
                        li.style.transform = `translateX(-85px)`; // Elastic limit
                    }
                }, { passive: false });

                li.addEventListener('touchend', (e) => {
                    if (!liIsSwiping) return;
                    liIsSwiping = false;
                    const deltaX = liTouchCurrentX - liTouchStartX;

                    li.style.transition = 'transform 0.2s cubic-bezier(0.25, 1, 0.5, 1)';

                    if (deltaX < -40) {
                        // Snap open (-70px is width of delete button)
                        li.style.transform = `translateX(-70px)`;

                        // Auto-close if clicking anywhere else
                        const closeSwipe = (evt) => {
                            if (!liContainer.contains(evt.target)) {
                                li.style.transform = `translateX(0)`;
                                deleteBtn.style.opacity = '0';
                                document.removeEventListener('touchstart', closeSwipe);
                            }
                        };
                        // Add slightly later to not trigger instantly
                        setTimeout(() => document.addEventListener('touchstart', closeSwipe), 50);
                    } else {
                        // Snap closed
                        li.style.transform = `translateX(0)`;
                        deleteBtn.style.opacity = '0';
                    }
                }, { passive: true });

                li.ondragstart = (e) => {
                    dragItemIndex = index;
                    li.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                };
                li.ondragend = () => {
                    li.classList.remove('dragging');
                    dragItemIndex = null;
                };
                li.ondragover = (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                };
                li.ondrop = (e) => {
                    e.preventDefault();
                    if (dragItemIndex === null || dragItemIndex === index) return;
                    let targetList = scheduleData[selectedDate];
                    let draggedItem = targetList.splice(dragItemIndex, 1)[0];
                    targetList.splice(index, 0, draggedItem);

                    while (targetList.length < 10) {
                        targetList.push({ text: '', checked: false, color: null });
                    }
                    scheduleData[selectedDate] = targetList.slice(0, 10);

                    saveSchedule();
                    renderTodos();
                    renderCalendar();
                };

                let effectiveColor = task.color || defaultColor;
                if (task.checked) {
                    li.style.borderLeftColor = effectiveColor;
                    li.style.backgroundColor = effectiveColor + '30';
                } else {
                    li.style.borderLeftColor = '#eee';
                    li.style.backgroundColor = '#f9f9f9';
                }

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'todo-checkbox';
                checkbox.checked = task.checked;
                checkbox.onchange = () => {
                    task.checked = checkbox.checked;
                    saveSchedule();
                    renderTodos();
                    renderCalendar();
                };

                const input = document.createElement('input');
                input.type = 'text';
                input.className = `todo-input ${task.checked ? 'completed' : ''}`;
                input.value = task.text;
                input.placeholder = "할 일을 입력하세요";
                input.onblur = (e) => {
                    task.text = e.target.value;
                    saveSchedule();
                    renderCalendar();
                };
                input.oninput = (e) => {
                    task.text = e.target.value;
                    renderCalendar();
                };
                input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };

                // Custom Color Picker Wrapper
                const colorPickerWrapper = document.createElement('div');
                colorPickerWrapper.className = 'color-picker-wrapper';

                const swatchTrigger = document.createElement('div');
                swatchTrigger.className = 'swatch-trigger';
                swatchTrigger.style.backgroundColor = task.color || defaultColor;
                swatchTrigger.title = "항목 색상 변경";

                const palettePopup = document.createElement('div');
                palettePopup.className = 'palette-popup';
                const popupId = 'palette-' + index;
                palettePopup.id = popupId;

                swatchTrigger.onclick = (e) => {
                    e.stopPropagation();
                    togglePalette(popupId);
                };

                PRESET_COLORS.forEach(colorHex => {
                    const swatch = document.createElement('div');
                    swatch.className = 'palette-color-item';
                    swatch.style.backgroundColor = colorHex;
                    swatch.onclick = (e) => {
                        e.stopPropagation(); // Prevent document click from closing immediately before processing
                        task.color = colorHex;
                        swatchTrigger.style.backgroundColor = colorHex;
                        palettePopup.classList.remove('show');
                        activePaletteId = null;

                        saveSchedule();
                        renderTodos();
                        renderCalendar(); // React immediately
                    };
                    palettePopup.appendChild(swatch);
                });

                colorPickerWrapper.appendChild(swatchTrigger);
                colorPickerWrapper.appendChild(palettePopup);

                // Routine Trigger Button
                const routineBtn = document.createElement('button');
                routineBtn.className = 'routine-trigger-btn';
                routineBtn.innerHTML = '🔄';
                routineBtn.title = "반복 루틴 설정";
                routineBtn.onclick = (e) => {
                    e.stopPropagation();
                    openRoutineModal(index);
                };

                li.appendChild(checkbox);
                li.appendChild(input);
                li.appendChild(routineBtn);
                li.appendChild(colorPickerWrapper);

                liContainer.appendChild(deleteBtn);
                liContainer.appendChild(li);
                todoListEl.appendChild(liContainer);
            });
        }

        // Routine Deletion Logic
        let currentDeleteRoutineDate = null;
        let currentDeleteRoutineIndex = null;

        function showRoutineDeleteModal(date, index) {
            currentDeleteRoutineDate = date;
            currentDeleteRoutineIndex = index;
            document.getElementById('routine-delete-modal').style.display = 'flex';
        }

        function closeRoutineDeleteModal() {
            document.getElementById('routine-delete-modal').style.display = 'none';
            currentDeleteRoutineDate = null;
            currentDeleteRoutineIndex = null;
        }

        document.getElementById('btn-delete-single').addEventListener('click', () => {
            if (currentDeleteRoutineDate && currentDeleteRoutineIndex !== null) {
                // Remove routine tracking just for this instance, or delete it completely
                // Easiest is to just remove it and add empty slot
                scheduleData[currentDeleteRoutineDate].splice(currentDeleteRoutineIndex, 1);
                scheduleData[currentDeleteRoutineDate].push({ text: '', checked: false, color: null });
                saveSchedule();
                renderTodos();
                renderCalendar();
                closeRoutineDeleteModal();
            }
        });

        document.getElementById('btn-delete-all').addEventListener('click', () => {
            if (currentDeleteRoutineDate && currentDeleteRoutineIndex !== null) {
                const targetTask = scheduleData[currentDeleteRoutineDate][currentDeleteRoutineIndex];
                const routineId = targetTask.routineId;

                if (routineId) {
                    // Iterate through all dates and remove the task with this routineId
                    for (const date in scheduleData) {
                        scheduleData[date] = scheduleData[date].filter(t => t.routineId !== routineId);
                        // Ensure we still have 10 slots per day
                        while (scheduleData[date].length < 10) {
                            scheduleData[date].push({ text: '', checked: false, color: null });
                        }
                    }
                    saveSchedule();
                    renderTodos();
                    renderCalendar();
                }
                closeRoutineDeleteModal();
            }
        });

        function togglePalette(paletteId) {
            const popup = document.getElementById(paletteId);

            // Close all other palettes first
            document.querySelectorAll('.palette-popup').forEach(p => {
                if (p.id !== paletteId) {
                    p.classList.remove('show');
                    const container = p.closest('.todo-item-container');
                    const item = p.closest('.todo-item');
                    if (container) container.style.zIndex = '0'; // Reset container z-index
                    if (item) item.style.zIndex = '2'; // Reset item z-index
                }
            });

            if (popup.classList.contains('show')) {
                popup.classList.remove('show');
                const container = popup.closest('.todo-item-container');
                const item = popup.closest('.todo-item');
                if (container) container.style.zIndex = '0';
                if (item) item.style.zIndex = '';
                activePaletteId = null;
            } else {
                popup.classList.add('show');
                const container = popup.closest('.todo-item-container');
                const item = popup.closest('.todo-item');
                // Elevate the entire container to break out of implicit stacking contexts
                if (container) container.style.zIndex = '999';
                if (item) item.style.zIndex = '999';
                activePaletteId = paletteId;
            }
        }

        // Routine Functions
        function openRoutineModal(taskIndex) {
            const task = scheduleData[selectedDate][taskIndex];
            if (!task || !task.text) {
                alert("먼저 할 일을 입력한 후 루틴을 설정해주세요.");
                return;
            }
            currentRoutineTaskIndex = taskIndex;
            document.getElementById('routine-start-date').value = selectedDate;

            // Set default end date to 1 month from now
            const startD = new Date(selectedDate);
            startD.setMonth(startD.getMonth() + 1);
            document.getElementById('routine-end-date').value = startD.toISOString().split('T')[0];

            document.getElementById('dim-overlay').classList.add('show');
            document.getElementById('routine-modal').classList.add('show');
        }

        function closeRoutineModal() {
            document.getElementById('dim-overlay').classList.remove('show');
            document.getElementById('routine-modal').classList.remove('show');
            currentRoutineTaskIndex = null;
        }

        function applyRoutine() {
            if (currentRoutineTaskIndex === null) return;

            const taskToRepeat = scheduleData[selectedDate][currentRoutineTaskIndex];
            const startDateStr = document.getElementById('routine-start-date').value;
            const endDateStr = document.getElementById('routine-end-date').value;
            const freqDays = parseInt(document.getElementById('routine-frequency').value, 10);

            if (!endDateStr) {
                alert("종료 날짜를 선택해주세요.");
                return;
            }

            let currentStr = startDateStr;
            let addedCount = 0;

            // Generate sequence
            while (true) {
                let d = new Date(currentStr);
                d.setDate(d.getDate() + freqDays);
                currentStr = d.toISOString().split('T')[0];

                if (currentStr > endDateStr) break;

                // Add to scheduleData
                if (!scheduleData[currentStr]) {
                    scheduleData[currentStr] = Array(10).fill().map(() => ({ text: '', checked: false, color: null }));
                }

                // Find first empty slot
                let slotIndex = scheduleData[currentStr].findIndex(t => t.text === '');
                if (slotIndex !== -1) {
                    scheduleData[currentStr][slotIndex] = {
                        text: taskToRepeat.text,
                        checked: false,
                        color: taskToRepeat.color || defaultColor
                    };
                    addedCount++;
                }
            }

            saveSchedule();
            renderCalendar();
            closeRoutineModal();
            alert(`루틴 생성 완료! 총 ${addedCount}개의 일정이 추가되었습니다.`);
        }

        // Setup & Nav
        window.switchTab = function (tabId) {
            // Update Active Class on Nav
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            if (tabId === 'schedule-view') {
                document.getElementById('nav-schedule').classList.add('active');
            } else {
                document.getElementById('nav-settings').classList.add('active');
            }

            // Show/Hide Views
            document.getElementById('schedule-view').style.display = (tabId === 'schedule-view') ? 'flex' : 'none';
            document.getElementById('settings-view').style.display = (tabId === 'settings-view') ? 'block' : 'none';

            // Re-render when switching back to schedule
            if (tabId === 'schedule-view') {
                renderCalendar();
                renderTodos();
            }
        };

        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
            renderTodos();
        }

        let isMonthAnimating = false;

        function changeMonth(delta, isFromSwipe = false, currentSwipeX = 0) {
            if (isMonthAnimating) return;
            isMonthAnimating = true;

            const grid = document.getElementById('calendar');
            const direction = delta > 0 ? -1 : 1;

            // 1. Slide Out Old Month
            grid.style.transition = 'transform 0.2s ease-in, opacity 0.2s';
            if (isFromSwipe) {
                // Continue slide from the finger's current position to offscreen
                const exitX = delta > 0 ? (currentSwipeX - window.innerWidth / 2) : (currentSwipeX + window.innerWidth / 2);
                grid.style.transform = `translateX(${exitX}px)`;
            } else {
                // Button click, slide out slightly then disappear
                grid.style.transform = `translateX(${direction * 30}%)`;
            }
            grid.style.opacity = '0';

            setTimeout(() => {
                // 2. Data Update
                currentMonth += delta;
                if (currentMonth > 11) { currentMonth = 0; currentYear++; }
                else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
                renderCalendar();
                renderMemos();

                // 3. Teleport grid to opposite side invisibly
                grid.style.transition = 'none';
                grid.style.transform = `translateX(${-direction * 30}%)`;

                // 4. Slide In New Month
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        grid.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease-out';
                        grid.style.transform = 'translateX(0)';
                        grid.style.opacity = '1';

                        // 5. Clean up
                        setTimeout(() => {
                            grid.style.transition = '';
                            isMonthAnimating = false;
                        }, 300);
                    });
                });
            }, 200);
        }

        function goToToday() {
            const now = new Date();
            currentYear = 2026;
            currentMonth = 0;
            if (now.getFullYear() === 2026) {
                currentMonth = now.getMonth();
                const dKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                selectDate(dKey);
            } else {
                selectDate('2026-01-01');
            }
            renderMemos();
        }

        // Touch Swipe Navigation for Calendar (Native Feel)
        let touchStartX = 0;
        let touchStartY = 0;
        let touchCurrentX = 0;
        let isSwiping = false;
        let swipeDirectionDetermined = false;
        const calendarEl = document.getElementById('calendar');

        calendarEl.addEventListener('touchstart', e => {
            if (isMonthAnimating) return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            touchCurrentX = touchStartX;
            isSwiping = true;
            swipeDirectionDetermined = false;
            calendarEl.style.transition = 'none'; // Disable transition for 1:1 finger tracking
        }, { passive: true });

        calendarEl.addEventListener('touchmove', e => {
            if (!isSwiping || isMonthAnimating) return;
            const currentY = e.changedTouches[0].screenY;
            touchCurrentX = e.changedTouches[0].screenX;

            const deltaX = touchCurrentX - touchStartX;
            const deltaY = currentY - touchStartY;

            if (!swipeDirectionDetermined) {
                // If moving more vertically than horizontally, it's a scroll
                if (Math.abs(deltaY) > Math.abs(deltaX)) {
                    isSwiping = false;
                    calendarEl.style.transform = '';
                    return;
                }
                swipeDirectionDetermined = true;
            }

            // Only horizontal swipes reach here, prevent page bouncy/scrolling
            if (e.cancelable) e.preventDefault();

            // Drag the calendar grid directly with the finger
            calendarEl.style.transform = `translateX(${deltaX}px)`;
        }, { passive: false });

        calendarEl.addEventListener('touchend', e => {
            if (!isSwiping || isMonthAnimating) return;
            isSwiping = false;
            const deltaX = touchCurrentX - touchStartX;
            const swipeThreshold = 50;

            if (deltaX < -swipeThreshold) {
                // Swiped Left -> Next Month
                changeMonth(1, true, deltaX);
            } else if (deltaX > swipeThreshold) {
                // Swiped Right -> Prev Month
                changeMonth(-1, true, deltaX);
            } else {
                // Drag not far enough, snap back to center
                calendarEl.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                calendarEl.style.transform = 'translateX(0)';
                setTimeout(() => {
                    calendarEl.style.transition = '';
                }, 300);
            }
        }, { passive: true });
        // Hide bottom menu when scrolling down
        window.addEventListener('scroll', () => {
            const bottomMenu = document.querySelector('.bottom-menu');
            if (window.scrollY > 10) {
                bottomMenu.classList.add('hidden');
            } else {
                bottomMenu.classList.remove('hidden');
            }
        });

        // Init
        goToToday();
    </script>
</body>

</html>
