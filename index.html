<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2026 Schedule App</title>
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Schedule">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2370/2370264.png">

    <!-- Firebase SDK (Compat versions for simple integration) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics-compat.js"></script>
    <!-- SortableJS for Drag and Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <style>
        * {
            box-sizing: border-box !important;
            -webkit-tap-highlight-color: transparent; /* 클릭 시 회색 잔상 제거 */
        }

        body {
            /* 텍스트 선택 방지 (입력창 제외) */
            -webkit-user-select: none;
            user-select: none;
            /* 모바일 브라우저 pull-to-refresh 효과 및 바운스 방지 */
            overscroll-behavior-y: none;
        }

        input, textarea {
            /* 입력창에서는 텍스트 선택 허용 */
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        .btn, .calendar-cell, .todo-checkbox, .drag-zone, .routine-trigger-btn, .swatch-trigger {
            /* 버튼류 클릭 시 반응성 개선 (지연 시간 최적화) */
            touch-action: manipulation;
            cursor: pointer;
        }

        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --text-color: #333;
            --range-color: #1abc9c;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: 1px solid rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --glass-blur: blur(16px);
        }

        /* Hide scrollbars globally on all elements */
        * {
            -ms-overflow-style: none !important;
            /* IE and Edge */
            scrollbar-width: none !important;
            /* Firefox */
        }

        *::-webkit-scrollbar {
            width: 0 !important;
            height: 0 !important;
            display: none !important;
            /* Chrome, Safari and Opera */
        }

        /* Specific overrides for containers that tend to show scrollbars in Edge/Windows */
        .events-container,
        .calendar-grid,
        .right-panel,
        .todo-list,
        #settings-view {
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }

        .events-container::-webkit-scrollbar,
        .calendar-grid::-webkit-scrollbar,
        .right-panel::-webkit-scrollbar,
        .todo-list::-webkit-scrollbar,
        #settings-view::-webkit-scrollbar {
            display: none !important;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-y: auto;
            /* Clean, Transparent iOS-style Mesh Gradient */
            background-color: #f5f7fa;
            background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            /* Prevent horizontal page shaking on swipe */
        }

        .main-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 480px;

            /* Glassmorphism Main Body */
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-left: var(--glass-border);
            border-right: var(--glass-border);
            box-shadow: var(--glass-shadow);

            position: relative;
            min-height: 100vh;
            border-radius: 0;
        }

        #schedule-view,
        #health-view,
        #settings-view {
            display: none;
            flex-direction: column;
            width: 100%;
            flex: 1;
            padding-bottom: 90px;
        }

        .calendar-section {
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
            padding: 10px 0 !important; /* [수정] 좌우 패딩을 없애 꽉 차게 함 */
            display: flex;
            flex-direction: column;
            background: transparent;
            user-select: none;
            overflow-x: hidden;
            /* Make calendar section take up essentially the full viewport height */
            min-height: calc(100vh - 70px);
        }

        .calendar-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 5px !important; /* 연/월 제목과 요일 사이 간격도 살짝 줄임 */
            gap: 5px !important;
        }

        .header-left {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .calendar-header h2 {
            margin: 0;
            font-size: 20px;
            color: #444;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
        }

        .calendar-nav button {
            background: none;
            border: 1px solid #eee;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 5px;
            color: #666;
            transition: all 0.2s;
        }

        .calendar-nav button:hover {
            background-color: #f0f0f0;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* [수정] 그리드 전체의 배경색을 테두리 색으로 설정 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: auto;
            /* 틈새를 테두리 색상으로 메움 */
            gap: 1px !important; 
            background-color: rgba(255, 255, 255, 0.3) !important; 
            
            padding: 0 !important;
            margin-top: 8px !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            overflow: hidden !important;
        }

        .calendar-grid::-webkit-scrollbar {
            display: none;
        }

        .day-header {
            text-align: center;
            padding-top: 5px !important;
            padding-bottom: 5px !important;
            height: auto !important;
            font-weight: 600;
            font-size: 13px;
            border-right: var(--glass-border);
            border-bottom: 2px solid rgba(0, 0, 0, 0.05) !important;
            margin-bottom: 2px !important;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .day-header.sunday {
            color: #e74c3c;
        }

        .day-header.saturday {
            color: #3498db;
        }

        /* [수정] 개별 칸의 테두리를 제거 (그리드의 gap이 테두리 역할을 함) */
        .calendar-cell, 
        .calendar-cell.empty-top, 
        .calendar-cell.empty-bottom {
            border: none !important; /* 개별 테두리 삭제 */
            margin: 0 !important;   /* 마진 삭제 */
            background-color: rgba(255, 255, 255, 0.2) !important; /* 칸 내부 배경색 */
            height: 110px !important;
            box-sizing: border-box;
            display: flex !important;
            flex-direction: column !important;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
            overflow: hidden !important;
        }

        /* [수정] 상단 빈 칸 높이 유지 */
        .calendar-cell.empty-top {
            pointer-events: none;
            height: 50px !important;
            min-height: 50px !important;
            background-color: rgba(255, 255, 255, 0.05) !important;
        }

        /* [수정] 하단 빈 칸 높이 유지 */
        .calendar-cell.empty-bottom {
            pointer-events: none;
            height: 40px !important;
            min-height: 40px !important;
            background-color: transparent !important;
        }

        .calendar-cell:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        /* 1. [수정] 파란색 선택 테두리 및 기존 노란색 오늘 배경 제거 */
        .calendar-cell.selected {
            background-color: transparent !important; 
            box-shadow: none !important; 
        }

        .calendar-cell.today {
            background-color: transparent !important; /* 기존 연노랑 배경 제거 */
        }

        /* 날짜 숫자가 칸 천장에 붙지 않도록 조정 */
        .day-number-container {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important; /* 숫자를 컨테이너 정중앙에 배치 */
            width: 100%;
            height: 28px !important; /* 숫자가 노는 공간을 확보 */
            padding-top: 4px !important; /* 숫자 위에 4px 정도 여유 */
            margin-bottom: 4px !important;
            box-sizing: border-box !important;
            flex-shrink: 0 !important;
            overflow: hidden !important;
        }

        .day-number {
            font-weight: 600;
            font-size: 13px;          /* 숫자가 너무 커서 밀려나지 않게 살짝 조절 */
            color: #555;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 20px;
            height: 20px;
            line-height: 1;
            border-radius: 50%;
            z-index: 2;
        }

        /* 2. [추가] 오늘 날짜 스타일 (진한 검정 동그라미 + 흰색 글자) */
        .calendar-cell.today .day-number {
            background-color: #000000 !important;
            color: #ffffff !important;
            border-radius: 50%;
            width: 24px !important;
            height: 24px !important;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* 3. [추가] 선택된 날짜 스타일 (연한 검정 동그라미) */
        /* 오늘이면서 선택된 경우는 오늘 스타일(진한 검정)이 유지됩니다 */
        .calendar-cell.selected:not(.today) .day-number {
            background-color: rgba(0, 0, 0, 0.15) !important; /* 연한 검정(회색빛) */
            color: #000000 !important;
            border-radius: 50%;
            width: 24px !important;
            height: 24px !important;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .day-number.holiday {
            color: #e74c3c;
        }

        /* 4. [보정] 일요일/공휴일 빨간색 글씨가 동그라미 안에서는 흰색으로 보이게 (오늘일 때만) */
        .calendar-cell.today .day-number.holiday {
            color: #ffffff !important;
        }

        .mark-circle {
            border: 2px solid #e74c3c;
            color: #e74c3c;
            font-weight: bold;
            background: white;
            width: 18px;
            /* Slightly smaller diameter */
            height: 18px;
            font-size: 12px;
            /* Adjust font to fit */
        }

        /* 동그라미: 숫자 박스 테두리에 적용 */
        .mark-circle {
            border: 2px solid #e74c3c !important;
            background: white;
        }

        /* 엑스 레이어: 숫자와 같은 위치에 겹치도록 절대 위치 설정 */
        .mark-x-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px; /* X의 크기 */
            height: 18px;
            transform: translate(-50%, -50%); /* 정확히 정중앙으로 보정 */
            pointer-events: none; /* 클릭 방해 금지 */
            z-index: 5;
        }

        .mark-x-layer::before,
        .mark-x-layer::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: #e74c3c; /* 빨간색 선 */
            border-radius: 2px;
            top: 50%;
            left: 0;
        }

        .mark-x-layer::before { transform: rotate(45deg); }
        .mark-x-layer::after { transform: rotate(-45deg); }

        .events-container {
            display: flex;
            flex-direction: column;
            gap: 1px;
            overflow: visible !important;
            margin: 0 !important;
            padding: 0 !important;
            flex-grow: 1 !important;
        }

        /* 기간 블록 기본 스타일 */
        .range-pill {
            font-size: 10px !important; 
            padding: 1px 4px;
            white-space: nowrap;
            line-height: 1.3;
            min-height: 16px;
            color: #000000 !important;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            z-index: 5;
            margin-top: 1.5px;
            border: none !important;
            /* [수정] 너비를 꽉 채워서 날짜 사이 틈을 없앰 */
            width: 100%; 
            margin-left: 0 !important;
            margin-right: 0 !important;
            overflow: visible; /* 텍스트가 시작점에서만 보이게 하기 위해 */
        }

        /* [핵심] 시작, 중간, 끝 블록의 마진과 라운드를 조절해서 음영(중첩) 제거 */
        .range-pill.range-start { 
            border-radius: 3px 0 0 3px; 
            width: calc(100% + 1px); /* 오른쪽으로 1px 더 늘려서 틈 제거 */
            padding-right: 8px;
        }

        .range-pill.range-middle { 
            border-radius: 0; 
            width: calc(100% + 2px); /* 좌우로 1px씩 더 늘려 겹침 현상 방지 */
            margin-left: -1px !important;
            padding-left: 8px;
            padding-right: 8px;
        }

        .range-pill.range-end { 
            border-radius: 0 3px 3px 0; 
            width: calc(100% + 1px); 
            margin-left: -1px !important;
            padding-left: 8px;
        }

        .range-pill.range-single { 
            border-radius: 3px; 
            margin: 1px 2px !important; 
            width: auto; 
        }

        /* [수정] 완료된 기간 블록 가로줄 효과 제거 */
        .range-pill.completed {
            opacity: 0.4; /* 지난 일정임을 알리기 위해 흐리게만 처리 */
            box-shadow: none !important;
            border: none !important;
        }

        /* [복구 & 수정] 일반 할 일 (글자 크기 복구 및 넘치면 생략 처리) */
        .event-pill {
            font-size: 10px !important; 
            padding: 2px 4px; /* 기존보다 상하좌우 1px씩 더 넓힘 */
            margin: 1.5px 1px !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 넘치는 글자는 '...'으로 표시 */
            line-height: 1.3; /* 가독성을 위해 행간 확보 */
            border-radius: 3px;
            max-width: 100%;
            display: block;
            border: none;
            height: 16px; /* 높이를 살짝 키워 텍스트가 안 잘리게 함 */
            
            /* [핵심 수정] 글자 색상을 완전한 검정으로 고정 */
            color: #000000 !important; 
            /* 글자를 조금 더 선명하게 보이기 위해 두께 조절 */
            font-weight: 600; 
            /* 글자 배경에 연한 그림자를 주어 가독성 추가 확보 (선택 사항) */
            text-shadow: 0 0 1px rgba(255, 255, 255, 0.3);
        }

        /* [수정] 완료된 할 일 스타일: 가로줄(line-through) 제거 */
        .event-pill.completed {
            /* text-decoration: line-through; <- 이 줄을 삭제했습니다 */
            opacity: 0.5;                /* 글씨가 연해지는 효과만 유지 */
            color: #444 !important;      /* 완료된 항목은 약간 진한 회색으로 */
            font-weight: normal;
        }

        /* [복구] 할 일 초과 개수 표시 */
        .more-count {
            font-size: 9px;
            color: #666;
            text-align: right;
            padding-right: 4px;
            margin-top: 2px;
            font-weight: bold;
        }

        /* [복구] 기간 블록 라벨 텍스트 */
        .range-pill-text {
            position: absolute;
            left: 6px;
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
            font-weight: 600;
            color: #000000 !important;
            font-size: 10px !important;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.5);
        }

        /* 하단 패널(할일 목록)을 캘린더 바로 아래 붙여서 스크롤해야 보이게 설정 */
        .right-panel {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            border-top: var(--glass-border);
        }

        .todo-wrapper {
            display: flex;
            flex-direction: column;
        }

        .todo-header {
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: var(--glass-border);
        }

        .selected-date-display {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .todo-item-container {
            position: relative;
            width: 100%;
            margin-bottom: 8px;
            border-radius: 8px;
            background-color: transparent;
            touch-action: pan-y;
            /* Prevent native horizontal drag/navigation */
            -webkit-tap-highlight-color: transparent;
            /* Remove gray tap highlight */
        }

        .todo-item {
            display: flex;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            min-width: 0;
            position: relative;
            z-index: 2;
            transition: transform 0.2s ease-out;
            
            /* [수정] 브라우저 기본 동작 차단 및 제스처 최적화 */
            touch-action: pan-y; /* 수직 스크롤은 허용하되, 수평 제스처는 자바스크립트가 통제함 */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            overflow: visible; /* 삭제 버튼이 밀려나올 때 보이기 위함 */

            /* Combined Glassmorphism & Layout */
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.5);
            border: var(--glass-border);
            border-left: 4px solid #eee;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* 드래그 핸들 스타일 */
        .drag-handle {
            cursor: grab;
            color: #ccc;
            padding-right: 10px;
            font-size: 18px;
            user-select: none;
        }

        /* 드래그 중인 항목 (그림자 효과) */
        .sortable-chosen {
            background-color: #ffffff !important;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2) !important;
            transform: scale(1.03);
            z-index: 9999 !important;
            opacity: 1 !important;
        }

        /* 원래 위치에 남는 점선 박스 (반투명 잔상) */
        .sortable-ghost {
            opacity: 0.2 !important;
            background-color: #e3f2fd !important; /* 연한 파란색 톤으로 가이드 표시 */
            border: 2px dashed #4a90e2 !important;
        }

        /* 드래그 핸들 아이콘 삭제를 위한 기존 클래스 제거 */
        .drag-handle { display: none !important; }

        .todo-input {
            user-select: text !important;
            /* Allow selection inside input for typing */
            -webkit-user-select: text !important;
        }

        .todo-delete-btn {
            position: absolute;
            top: 0;
            right: 0;
            background-color: #ff3b30;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.2s;
            /* Occupies full height and width behind the main item */
            width: 100%;
            height: 100%;
            border-radius: 8px;
            /* Match container radius since overflow is no longer hidden */
        }

        .todo-item.dragging {
            opacity: 0.5;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0px;
            /* Margins handled by container */
            flex: 1;
            overflow-y: auto;
        }

        .todo-item:active {
            cursor: grabbing;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);

        .palette-popup {

            right: 0;

        .palette-color-item {
            width: 20px;
            height: 20px;

            backdrop-filter: var(--glass-blur);

        /* Routine Bottom Sheet Modal */

        /* Dim Background for Modal */

        #routine-delete-modal {
            display: none;

</head>

    <script>
        // ====== Firebase Setup ======
        const firebaseConfig = {
            apiKey: "AIzaSyDPRFTO7qYhlJJyjOfb-8nsR7OLmyqVV9U",
            authDomain: "hojin-schedule.firebaseapp.com",
            projectId: "hojin-schedule",
            storageBucket: "hojin-schedule.firebasestorage.app",
            messagingSenderId: "38268072154",
            appId: "1:38268072154:web:c73f3ce19d42abdfe175e3",
            measurementId: "G-LWXJWBR9FM"
        };

        firebase.initializeApp(firebaseConfig);
        // 라이브러리가 로드되었을 때만 실행
        if (typeof firebase.analytics === 'function') {
            firebase.analytics();
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ====== Global State ======
        let currentUser = null;
        let appInitialized = false;
        const PRESET_COLORS = ['#ffe4e1', '#ffc0cb', '#ffb6c1', '#f8bbd0', '#f48fb1', '#fff3e0', '#ffe0b2', '#ffccbc', '#fff9c4', '#fff59d', '#f1f8e9', '#dcedc8', '#e8f5e9', '#c8e6c9', '#e0f2f1', '#e3f2fd', '#bbdefb', '#e0f7fa', '#f3e5f5', '#e1bee7'];

        const todayObj = new Date();
        const todayDateKey = `${todayObj.getFullYear()}-${String(todayObj.getMonth() + 1).padStart(2, '0')}-${String(todayObj.getDate()).padStart(2, '0')}`;

        let calYear = todayObj.getFullYear();
        let calMonth = todayObj.getMonth();
        let selectedDate = todayDateKey;
        let activePaletteId = null;
        let currentRoutineTaskIndex = null;

        let defaultColor = localStorage.getItem('defaultColor') || '#ffb3ba';
        let scheduleData = JSON.parse(localStorage.getItem('scheduleData')) || {};
        let dateMarks = JSON.parse(localStorage.getItem('dateMarks')) || {};
        let rangeBlocks = JSON.parse(localStorage.getItem('rangeBlocks')) || [];
        let healthData = JSON.parse(localStorage.getItem('healthData')) || {};
        let healthMarks = JSON.parse(localStorage.getItem('healthMarks')) || {};
        let calHealthYear = todayObj.getFullYear();
        let calHealthMonth = todayObj.getMonth();
        let healthSelectedDate = todayDateKey;
        let healthClickCounts = {};
        let healthClickTimers = {};

        // ====== [핵심수정] 로그인 / 회원가입 함수 (전역 window 객체에 할당) ======
        window.handleLogin = async function () {
            const email = document.getElementById('auth-email').value;
            const pwd = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('auth-error');

            console.log("로그인 시도:", email);
            if (!email || !pwd) {
                errorEl.innerText = "이메일과 비밀번호를 입력해주세요.";
                return;
            }

            try {
                await auth.signInWithEmailAndPassword(email, pwd);
                console.log("로그인 성공");
            } catch (error) {
                console.error("로그인 에러:", error);
                errorEl.innerText = "로그인 실패: " + error.message;
            }
        };

        window.handleSignup = async function () {
            const email = document.getElementById('auth-email').value;
            const pwd = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('auth-error');

            if (!email || !pwd) {
                errorEl.innerText = "이메일과 비밀번호를 입력해주세요.";
                return;
            }

            try {
                await auth.createUserWithEmailAndPassword(email, pwd);
                alert("회원가입 성공! 자동으로 로그인됩니다.");
            } catch (error) {
                console.error("회원가입 에러:", error);
                errorEl.innerText = "회원가입 실패: " + error.message;
            }
        };

        function handleLogout() {
            auth.signOut();
            // Clear local states
            scheduleData = {};
            dateMarks = {};
            rangeBlocks = [];

            healthData = {};
            healthMarks = {};
            localStorage.clear();
            renderCalendar();
            renderTodos();
            renderHealthCalendar();
            renderWorkoutLogs();
            switchView('schedule');
        }

        async function loadCloudData() {
            if (!currentUser) return;
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    scheduleData = data.scheduleData || {};
                    dateMarks = data.dateMarks || {};
                    rangeBlocks = data.rangeBlocks || [];
                    healthData = data.healthData || {};
                    healthMarks = data.healthMarks || {};
                    if (data.defaultColor) defaultColor = data.defaultColor;
                }
                renderCalendar();
                renderTodos();
            } catch (e) { console.error("Data Load Error:", e); }
        }




        function saveHealthMarks() {
            localStorage.setItem('healthMarks', JSON.stringify(healthMarks));
            syncToCloud();
        }

        // Initialize Settings Palette
        document.addEventListener('DOMContentLoaded', () => {
            const settingsPalette = document.getElementById('settings-palette');
            const settingsTrigger = document.getElementById('setting-default-color-trigger');

            PRESET_COLORS.forEach(colorHex => {
                const swatch = document.createElement('div');
                swatch.className = 'palette-color-item';
                swatch.style.backgroundColor = colorHex;
                swatch.onclick = (e) => {
                    e.stopPropagation();
                    defaultColor = colorHex;
                    settingsTrigger.style.backgroundColor = colorHex;
                    settingsPalette.classList.remove('show');
                    activePaletteId = null;
                };
                settingsPalette.appendChild(swatch);
            });

            settingsTrigger.style.backgroundColor = defaultColor;
        });

        // Save Logic (Dual Save: Local + Cloud)
        function syncToCloud() {
            if (!currentUser) return;
            db.collection('users').doc(currentUser.uid).set({
                scheduleData: scheduleData,
                dateMarks: dateMarks,
                defaultColor: defaultColor,
                rangeBlocks: rangeBlocks,

                healthData: healthData,
                healthMarks: healthMarks
            }, { merge: true }).catch(e => console.error("Sync error:", e));
        }
        function saveRangeBlocks() {
            localStorage.setItem('rangeBlocks', JSON.stringify(rangeBlocks));
            syncToCloud();
        }

        function saveHealth() {
            // Auto-trim trailing empty weight boxes
            Object.keys(healthData).forEach(dateKey => {
                healthData[dateKey].forEach(w => {
                    if (Array.isArray(w.weights)) {
                        while (w.weights.length > 1 && w.weights[w.weights.length - 1] === '') {
                            w.weights.pop();
                        }
                        // Ensure at least 1 slot
                        if (w.weights.length === 0) w.weights.push('');
                    }
                });
            });
            localStorage.setItem('healthData', JSON.stringify(healthData));
            syncToCloud();
        }

        function saveSchedule() {
            localStorage.setItem('scheduleData', JSON.stringify(scheduleData));
            syncToCloud();
        }
        function saveMarks() {
            localStorage.setItem('dateMarks', JSON.stringify(dateMarks));
            syncToCloud();
        }

        function saveSettings() {
            localStorage.setItem('defaultColor', defaultColor);
            syncToCloud();
            renderCalendar();
            renderTodos();
            alert("저장되었습니다.");
        }

        function clearCurrentMonth() {
            if (!confirm(`${calYear}년 ${calMonth + 1}월의 모든 할 일 데이터를 초기화하시겠습니까?`)) return;
            const yearMonthStr = `${calYear}-${String(calMonth + 1).padStart(2, '0')}`;
            Object.keys(scheduleData).forEach(key => {

        function renderCalendar() {
            const calendarEl = document.getElementById('calendar');
            if (!calendarEl) return;
            calendarEl.innerHTML = '';

            const monthHeader = document.getElementById('current-month');
            if (monthHeader) {
                monthHeader.innerText = `${calYear}년 ${calMonth + 1}월`;
            }

            // 오늘 날짜 구하기 (YYYY-MM-DD)
            const todayObj = new Date();
            const todayStr = `${todayObj.getFullYear()}-${String(todayObj.getMonth() + 1).padStart(2, '0')}-${String(todayObj.getDate()).padStart(2, '0')}`;

            const days = ['일', '월', '화', '수', '목', '금', '토'];
            days.forEach((d, index) => {
                const cel = document.createElement('div');
                cel.className = 'day-header';
                if (index === 0) cel.classList.add('sunday');
                if (index === 6) cel.classList.add('saturday');
                cel.innerText = d;
                calendarEl.appendChild(cel);
            });

            const firstDay = new Date(calYear, calMonth, 1);
            const lastDay = new Date(calYear, calMonth + 1, 0);
            const firstDayIndex = firstDay.getDay();
            const lastDate = lastDay.getDate();
            const totalCells = 42;

            for (let i = 0; i < totalCells; i++) {
                const cel = document.createElement('div');
                const d = i - firstDayIndex + 1;

                if (i < firstDayIndex) {
                    // [핵심] 1일이 시작되기 전의 '빈 칸'을 확실히 생성
                    cel.className = 'calendar-cell empty-top';
                } else if (d <= lastDate) {
                    // 실제 날짜가 있는 칸
                    cel.className = 'calendar-cell';
                    const dateKey = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    if (dateKey === selectedDate) cel.classList.add('selected');

                    // Set z-index to allow text from earlier days to overflow onto later days
                    const colIndex = i % 7;
                    cel.style.zIndex = 10 - colIndex;

                    const now = new Date();
                    if (calYear === now.getFullYear() && calMonth === now.getMonth() && d === now.getDate()) {
                        cel.classList.add('today');
                    }

                    let markClass = '';
                    if (dateMarks[dateKey] === 'circle') markClass = 'mark-circle';
                    else if (dateMarks[dateKey] === 'x') markClass = 'mark-x';

                    cel.onclick = (e) => onCellClick(e, dateKey);

                    const dayOfWeek = i % 7;
                    const isHoliday = KOREAN_HOLIDAYS_2026[dateKey];
                    const isSunday = dayOfWeek === 0;
                    let dayNumClass = markClass;
                    if (isHoliday || isSunday) dayNumClass += ' holiday';

                    let html = `<div class="day-number-container"><div class="day-number ${dayNumClass}" ${isHoliday ? `title="${isHoliday}"` : ''}>${d}</div></div><div class="events-container">`;

                    const monthStart = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-01`;
                    const monthEnd = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(lastDate).padStart(2, '0')}`;
                    
                    // 해당 날짜에 포함되는 기간 블록 필터링
                    const dayRanges = rangeBlocks
                        .map((rb, idx) => ({ ...rb, idx, type: 'range' }))
                        .filter(rb => rb.endDate >= monthStart && rb.startDate <= monthEnd)
                        .filter(rb => dateKey >= rb.startDate && dateKey <= rb.endDate);

                    // 해당 날짜의 할 일 필터링
                    const dayTasks = (scheduleData[dateKey] || [])
                        .filter(t => t.text)
                        .map(t => ({ ...t, type: 'task' }));

                    // 두 목록 합치기
                    const combinedItems = [...dayRanges, ...dayTasks];
                    const MAX_VISIBLE = 3;
                    const visibleItems = combinedItems.slice(0, MAX_VISIBLE);

                    visibleItems.forEach(item => {
                        if (item.type === 'range') {
                            const rb = item;
                            let posClass = 'range-single';
                            if (rb.startDate !== rb.endDate) {
                                if (dateKey === rb.startDate) posClass = 'range-start';
                                else if (dateKey === rb.endDate) posClass = 'range-end';
                                else posClass = 'range-middle';
                            }
                            const label = (dateKey === rb.startDate) ? `<span class="range-pill-text">${rb.text || ''}</span>` : '';
                            const isCompleted = dateKey < todayStr ? 'completed' : '';
                            html += `<div class="range-pill ${posClass} ${isCompleted}" style="background:${rb.color};" onclick="event.stopPropagation();handleRangeBlockTap(${rb.idx})">${label}</div>`;
                        } else {
                            const t = item;
                            const bg = t.color || defaultColor; 
                            const completedClass = t.checked ? 'completed' : '';
                            html += `<div class="event-pill ${completedClass}" style="background:${bg};">${t.text}</div>`;
                        }
                    });

                    const remainingCount = combinedItems.length - MAX_VISIBLE;
                    if (remainingCount > 0) {
                        html += `<div class="more-count">+${remainingCount}</div>`;
                    }

                    html += `</div>`;
                    cel.innerHTML = html;
                } else {
                    // 날짜가 끝난 후의 빈 칸
                    cel.className = 'calendar-cell empty-bottom';
                }
                calendarEl.appendChild(cel);
            }
        }

        // Render Todos
        function renderTodos() {
            if (!selectedDate) return;
            document.getElementById('selected-date-title').innerText = selectedDate;
            const todoListEl = document.getElementById('todo-list');
            todoListEl.innerHTML = '';

            if (!scheduleData[selectedDate]) {
                scheduleData[selectedDate] = Array(2).fill().map(() => ({ text: '', checked: false, color: null }));
            }
            // Auto-sort: Move checked items to bottom
            scheduleData[selectedDate].sort((a, b) => (a.checked === b.checked) ? 0 : a.checked ? 1 : -1);

            const tasks = scheduleData[selectedDate];

            tasks.forEach((task, index) => {

                // Wrapper for Swipe-to-Delete
                const liContainer = document.createElement('div');
                liContainer.className = 'todo-item-container';

                // Delete Button (Background)
                const deleteBtn = document.createElement('div');
                deleteBtn.className = 'todo-delete-btn';
                deleteBtn.innerText = '삭제';
                deleteBtn.onclick = () => {
                    // Check if it's part of a routine
                    if (task.routineId) {
                        showRoutineDeleteModal(selectedDate, index);
                    } else {
                        // Normal delete
                        if (confirm('이 할 일을 삭제하시겠습니까?')) {
                            scheduleData[selectedDate].splice(index, 1);
                            saveSchedule();
                            renderTodos();
                            renderCalendar();
                        }
                    }
                };

                const li = document.createElement('li');
                li.className = 'todo-item';
                li.setAttribute('data-index', index);

                // Swipe Logic
                let currentTranslateX = 0; 

                li.addEventListener('touchstart', (e) => {
                    // [핵심 수정] 터치된 요소가 'INPUT'(텍스트란)일 때만 슬라이드 허용
                    if (e.target.tagName !== 'INPUT' || e.target.type === 'checkbox') {
                        liIsSwiping = false;
                        return;
                    }
                    
                    // 버튼이나 팔레트 내부 클릭 시 추가 방어
                    if (e.target.closest('.color-picker-wrapper') || e.target.closest('.palette-popup') || e.target.closest('.routine-trigger-btn')) {
                        liIsSwiping = false;
                        return; 
                    }

                    // 시작 시 현재 박스의 위치값을 저장 (이미 밀려있으면 -70, 아니면 0)
                    const transform = window.getComputedStyle(li).getPropertyValue('transform');
                    const matrix = new WebKitCSSMatrix(transform);
                    currentTranslateX = matrix.m41; 

                    liTouchStartX = e.touches[0].clientX;
                    liIsSwiping = true;
                    liSwipeDirectionDetermined = false;
                    li.style.transition = 'none';
                }, { passive: true });

                li.addEventListener('touchmove', (e) => {
                    if (!liIsSwiping) return;

                    const deltaX = e.touches[0].clientX - liTouchStartX;
                    
                    if (!liSwipeDirectionDetermined) {
                        if (Math.abs(deltaX) > 10) liSwipeDirectionDetermined = true;
                        return;
                    }

                    // [핵심] 기존 위치(currentTranslateX)에 움직인 거리(deltaX)를 더함
                    let moveX = currentTranslateX + deltaX;

                    // 범위 제한: -80px(최대 삭제)부터 0px(원위치) 사이에서만 움직임
                    moveX = Math.min(0, Math.max(moveX, -80));

                    if (e.cancelable) e.preventDefault();
                    li.style.transform = `translateX(${moveX}px)`;
                    deleteBtn.style.opacity = Math.abs(moveX) / 80;
                }, { passive: false });

                li.addEventListener('touchend', (e) => {
                    if (!liIsSwiping) return;
                    liIsSwiping = false;

                    const transform = window.getComputedStyle(li).getPropertyValue('transform');
                    const matrix = new WebKitCSSMatrix(transform);
                    const finalX = matrix.m41;

                    li.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                    
                    // [자연스러운 마무릿값 결정]
                    // -40px보다 더 왼쪽이면 열린 상태(-70px)로 고정, 아니면 닫힌 상태(0)로 복귀
                    if (finalX < -40) {
                        li.style.transform = 'translateX(-70px)';
                        deleteBtn.style.opacity = '1';

                        // Auto-close if clicking anywhere else
                        const closeSwipe = (evt) => {
                            if (!liContainer.contains(evt.target)) {
                                li.style.transform = `translateX(0)`;
                                deleteBtn.style.opacity = '0';
                                document.removeEventListener('touchstart', closeSwipe);
                            }
                        };
                        setTimeout(() => document.addEventListener('touchstart', closeSwipe), 50);
                    } else {
                        li.style.transform = 'translateX(0)';
                        deleteBtn.style.opacity = '0';
                    }
                }, { passive: true });

                let effectiveColor = task.color || defaultColor;
                if (task.checked) {
                    li.style.borderLeftColor = effectiveColor;
                    li.style.backgroundColor = effectiveColor + '30';
                } else {
                    li.style.borderLeftColor = '#eee';
                    li.style.backgroundColor = '#f9f9f9';
                }

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'todo-checkbox';
                checkbox.checked = task.checked;
                checkbox.onchange = () => {
                    task.checked = checkbox.checked;
                    saveSchedule();
                    renderTodos();
                    renderCalendar();
                };

                const input = document.createElement('input');
                input.type = 'text';
                input.className = `todo-input ${task.checked ? 'completed' : ''}`;
                input.value = task.text;
                input.placeholder = "할 일을 입력하세요";
                input.onblur = (e) => {
                    task.text = e.target.value;
                    saveSchedule();
                    renderCalendar();
                };
                input.oninput = (e) => {
                    task.text = e.target.value;
                    renderCalendar();
                };
                input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };

                // input 요소 자체에도 이벤트 추가 (클릭 시 슬라이드 초기화)
                input.addEventListener('focus', () => {
                    li.style.transition = 'transform 0.3s ease';
                    li.style.transform = 'translateX(0)';
                    deleteBtn.style.opacity = '0';
                    liIsSwiping = false;
                });

                // Custom Color Picker Wrapper
                const colorPickerWrapper = document.createElement('div');
                colorPickerWrapper.className = 'color-picker-wrapper';

                const swatchTrigger = document.createElement('div');
                swatchTrigger.className = 'swatch-trigger';
                swatchTrigger.style.backgroundColor = task.color || defaultColor;
                swatchTrigger.title = "항목 색상 변경";

                const palettePopup = document.createElement('div');
                palettePopup.className = 'palette-popup';
                const popupId = 'palette-' + index;
                palettePopup.id = popupId;

                // [추가] 색상 선택 버튼 클릭 시 슬라이드 초기화 (안전장치)
                swatchTrigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    li.style.transition = 'transform 0.3s ease';
                    li.style.transform = 'translateX(0)';
                    deleteBtn.style.opacity = '0';
                    liIsSwiping = false;
                    
                    togglePalette(popupId);
                });

                PRESET_COLORS.forEach(colorHex => {
                    const swatch = document.createElement('div');
                    swatch.className = 'palette-color-item';
                    swatch.style.backgroundColor = colorHex;
                    swatch.onclick = (e) => {
                        e.stopPropagation(); // Prevent document click from closing immediately before processing
                        task.color = colorHex;
                        swatchTrigger.style.backgroundColor = colorHex;
                        palettePopup.classList.remove('show');
                        activePaletteId = null;

                        saveSchedule();
                        renderTodos();
                        renderCalendar(); // React immediately
                    };
                    palettePopup.appendChild(swatch);
                });

                colorPickerWrapper.appendChild(swatchTrigger);
                colorPickerWrapper.appendChild(palettePopup);

                // Routine Trigger Button
                const routineBtn = document.createElement('button');
                routineBtn.className = 'routine-trigger-btn';
                routineBtn.innerHTML = '🔄';
                routineBtn.title = "반복 루틴 설정";
                routineBtn.onclick = (e) => {
                    e.stopPropagation();
                    openRoutineModal(index);
                };

                // [수정] 점 6개 대신 투명한 드래그 전용 영역 생성
                const dragZone = document.createElement('div');
                dragZone.className = 'drag-zone';
                dragZone.style.cssText = 'width: 30px; height: 100%; cursor: grab; flex-shrink: 0;';
                
                li.appendChild(dragZone);
                li.appendChild(checkbox);
                li.appendChild(input);
                li.appendChild(routineBtn);
                li.appendChild(colorPickerWrapper);

                liContainer.appendChild(deleteBtn);
                liContainer.appendChild(li);
                todoListEl.appendChild(liContainer);
            });

            // Initialize Sortable for Todos
            if (window.todoSortable) window.todoSortable.destroy(); // 기존 인스턴스 중복 방지
            window.todoSortable = new Sortable(todoListEl, {
                handle: '.drag-zone',      // [핵심] 오직 왼쪽 빈 공간을 눌렀을 때만 작동
                animation: 250,           // 이동 시 부드러운 애니메이션
                delay: 500,               // 500ms(0.5초) 동안 꾹 눌러야 드래그 시작
                delayOnTouchOnly: true,   // 모바일 터치 환경에서만 지연 시간 적용
                touchStartThreshold: 5,   // 5px 이상 움직이면 드래그 취소 (실수 방지)
                
                ghostClass: 'sortable-ghost',   // 옮겨질 위치의 가이드 스타일
                chosenClass: 'sortable-chosen', // 선택된 항목의 스타일
                
                // 드래그 시작 시 진동 피드백 (지원되는 기기에서만)
                onStart: function() {
                    if (window.navigator.vibrate) {
                        window.navigator.vibrate(50); 
                    }
                },

                onEnd: (evt) => {
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    if (oldIndex === newIndex) return;

                    // 실제 데이터 배열(scheduleData) 순서 교체
                    const targetList = scheduleData[selectedDate];
                    const draggedItem = targetList.splice(oldIndex, 1)[0];
                    targetList.splice(newIndex, 0, draggedItem);

                    saveSchedule(); // 변경된 순서 저장
                    renderCalendar(); // 캘린더 요약 반영
                    // renderTodos는 Sortable이 DOM을 이미 옮겼으므로 굳이 다시 부르지 않아도 됨

            // Add task button
            const addBtn = document.createElement('button');

        function togglePalette(paletteId) {
            const popup = document.getElementById(paletteId);

            // Close all other palettes first
            document.querySelectorAll('.palette-popup').forEach(p => {
                if (p.id !== paletteId) {
                    p.classList.remove('show');
                    const item = p.closest('.todo-item');
                    if (item) item.style.zIndex = '2'; // Reset z-index
                }
            });

            if (popup.classList.contains('show')) {
                popup.classList.remove('show');
                const item = popup.closest('.todo-item');
                if (item) item.style.zIndex = '';
                activePaletteId = null;
            } else {
                popup.classList.add('show');
                const item = popup.closest('.todo-item');
                if (item) item.style.zIndex = '999';
                activePaletteId = paletteId;
            }
        }

        let selectedRoutineColor = null;

        function openRoutineModal(taskIndex) {
            const task = scheduleData[selectedDate][taskIndex];
            if (!task || !task.text) {
                alert("먼저 할 일을 입력한 후 루틴을 설정해주세요.");
                return;
            }
            
            currentRoutineTaskIndex = taskIndex;
            
            // 1. 데이터 세팅
            document.getElementById('routine-start-date').value = selectedDate;
            const startD = new Date(selectedDate);
            startD.setMonth(startD.getMonth() + 1);
            document.getElementById('routine-end-date').value = startD.toISOString().split('T')[0];

            // 2. 모달 표시 (순서 중요)
            const modal = document.getElementById('routine-modal');
            const dim = document.getElementById('dim-overlay');
            
            if (modal && dim) {

        function closeRoutineModal() {

        function applyRoutine() {
            if (currentRoutineTaskIndex === null) return;

            // 1. 현재 선택된 날짜의 할 일 정보 가져오기
            const taskToRepeat = scheduleData[selectedDate][currentRoutineTaskIndex];
            const startDateStr = document.getElementById('routine-start-date').value;
            const endDateStr = document.getElementById('routine-end-date').value;
            const freqDays = parseInt(document.getElementById('routine-frequency').value, 10);

            if (!endDateStr) {
                alert("종료 날짜를 선택해주세요.");
                return;
            }

            // [핵심 수정] 루틴에서 선택한 색상을 '현재 날짜'의 할 일에도 즉시 적용
            taskToRepeat.color = selectedRoutineColor || taskToRepeat.color || defaultColor;

            // 루틴 식별 ID 생성
            const routineId = 'routine_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            taskToRepeat.routineId = routineId;

            let currentStr = startDateStr;
            let addedCount = 0;

            // 2. 반복 주기만큼 미래 날짜에 할 일 복사
            while (true) {
                let d = new Date(currentStr);
                d.setDate(d.getDate() + freqDays);
                currentStr = d.toISOString().split('T')[0];

                if (currentStr > endDateStr) break;

                if (!scheduleData[currentStr]) {
                    // 빈 슬롯 생성 (기본 3개 이상 보장)
                    scheduleData[currentStr] = Array(3).fill().map(() => ({ text: '', checked: false, color: null }));
                }

                // 첫 번째 빈 슬롯 찾기
                let slotIndex = scheduleData[currentStr].findIndex(t => t.text === '');
                
                const newTask = {
                    text: taskToRepeat.text,
                    checked: false,
                    color: taskToRepeat.color, // 위에서 지정한 색상 사용
                    routineId: routineId
                };

                if (slotIndex !== -1) {
                    scheduleData[currentStr][slotIndex] = newTask;
                } else {
                    scheduleData[currentStr].push(newTask);
                }
                addedCount++;
            }

            // 3. 저장 및 리렌더링
            saveSchedule();
            renderCalendar();
            renderTodos(); // 현재 날짜 목록도 다시 그려서 색상 반영 확인
            closeRoutineModal();
            alert(`루틴 생성 완료! 총 ${addedCount}개의 일정이 추가되었습니다.`);
        }

        // Setup & Nav

        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
            renderTodos();
        }

        let isMonthAnimating = false;

        // EXPOSE TO GLOBAL WINDOW
        window.changeMonth = function (delta, isFromSwipe = false, currentSwipeX = 0) {
            console.log('changeMonth called:', { delta, isFromSwipe, isMonthAnimating });
            if (isMonthAnimating) return;
            isMonthAnimating = true;

            // Safety reset for isMonthAnimating
            setTimeout(() => {
                console.log('Safety reset for isMonthAnimating (Schedule)');
                isMonthAnimating = false;
            }, 600);

            const grid = document.getElementById('calendar');
            const direction = delta > 0 ? -1 : 1;

            // 1. Slide Out Old Month
            grid.style.transition = 'transform 0.2s ease-in, opacity 0.2s';
            if (isFromSwipe) {
                // Continue slide from the finger's current position to offscreen
                const exitX = delta > 0 ? (currentSwipeX - window.innerWidth / 2) : (currentSwipeX + window.innerWidth / 2);
                grid.style.transform = `translateX(${exitX}px)`;
            } else {
                // Button click, slide out slightly then disappear
                grid.style.transform = `translateX(${direction * 30}%)`;
            }
            grid.style.opacity = '0';

            setTimeout(() => {
                // 2. Data Update
                calMonth += delta;
                if (calMonth > 11) { calMonth = 0; calYear++; }
                else if (calMonth < 0) { calMonth = 11; calYear--; }
                renderCalendar();

                // 3. Teleport grid to opposite side invisibly
                grid.style.transition = 'none';
                grid.style.transform = `translateX(${-direction * 30}%)`;

                // 4. Slide In New Month
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        grid.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease-out';
                        grid.style.transform = 'translateX(0)';
                        grid.style.opacity = '1';

                        // 5. Clean up
                        setTimeout(() => {
                            grid.style.transition = '';
                        }, 300);
                    });
                });
            }, 200);
        };

        window.goToToday = function () {
            const now = new Date();
            calYear = now.getFullYear();
            calMonth = now.getMonth();
            const dKey = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            selectDate(dKey);
        };
        // ====== Range Block Modal Functions ======
        const RANGE_COLORS = ['#bbdefb', '#c8e6c9', '#fff9c4', '#f8bbd0', '#e1bee7', '#ffccbc', '#b2dfdb', '#d1c4e9'];
        let pendingRangeColor = RANGE_COLORS[0];
        let editingRangeIdx = -1;

        function openRangeModal(editIdx) {
            editingRangeIdx = (editIdx !== undefined) ? editIdx : -1;
            const isEdit = editingRangeIdx >= 0;
            const rb = isEdit ? rangeBlocks[editingRangeIdx] : null;

            document.querySelector('#range-modal h3').innerText = isEdit ? '📅 기간 블록 수정' : '📅 기간 블록 추가';
            document.getElementById('range-modal-text').value = isEdit ? rb.text : '';
            const today = selectedDate || `${calYear}-${String(calMonth + 1).padStart(2, '0')}-01`;
            document.getElementById('range-start-date').value = isEdit ? rb.startDate : today;
            document.getElementById('range-end-date').value = isEdit ? rb.endDate : today;

            // Build color swatches
            const colorsDiv = document.getElementById('range-modal-colors');
            colorsDiv.innerHTML = '';
            pendingRangeColor = isEdit ? rb.color : RANGE_COLORS[0];
            RANGE_COLORS.forEach(c => {
                const sw = document.createElement('div');
                sw.style.cssText = `width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${c === pendingRangeColor ? '#333' : 'transparent'};`;
                sw.onclick = () => {
                    pendingRangeColor = c;
                    colorsDiv.querySelectorAll('div').forEach(d => d.style.borderColor = 'transparent');
                    sw.style.borderColor = '#333';
                };
                colorsDiv.appendChild(sw);

        function confirmRangeBlock() {
            const text = document.getElementById('range-modal-text').value.trim();
            const startDate = document.getElementById('range-start-date').value;
            const endDate = document.getElementById('range-end-date').value;
            if (!text) { alert('일정명을 입력하세요.'); return; }
            if (!startDate || !endDate) { alert('시작일과 종료일을 입력하세요.'); return; }
            if (startDate > endDate) { alert('종료일이 시작일보다 빠릅니다.'); return; }

            if (editingRangeIdx >= 0) {
                // Edit mode
                rangeBlocks[editingRangeIdx] = { startDate, endDate, text, color: pendingRangeColor };
            } else {
                // Add mode
                rangeBlocks.push({ startDate, endDate, text, color: pendingRangeColor });
            }
            editingRangeIdx = -1;
            saveRangeBlocks();
            document.getElementById('range-modal').style.display = 'none';
            renderCalendar();
        }

        function cancelRangeBlock() {
            editingRangeIdx = -1;
            document.getElementById('range-modal').style.display = 'none';
        }

        function handleRangeBlockTap(idx) {
            const rb = rangeBlocks[idx];
            document.getElementById('range-action-title').innerText = rb.text;
            document.getElementById('range-action-dates').innerText = `${rb.startDate} ~ ${rb.endDate}`;
            document.getElementById('range-action-modal').style.display = 'flex';

            document.getElementById('btn-range-edit').onclick = () => {
                document.getElementById('range-action-modal').style.display = 'none';
                openRangeModal(idx);
            };
            document.getElementById('btn-range-delete').onclick = () => {
                document.getElementById('range-action-modal').style.display = 'none';
                if (confirm(`"${rb.text}" 기간 블록을 삭제하시겠습니까?`)) {
                    rangeBlocks.splice(idx, 1);
                    saveRangeBlocks();
