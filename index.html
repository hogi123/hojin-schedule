<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Schedule App</title>
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Schedule">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2370/2370264.png">

    <!-- Firebase SDK (Compat versions for simple integration) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <!-- SortableJS for Drag and Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <style>
        * {
            box-sizing: border-box !important;
        }

        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --text-color: #333;
            --range-color: #1abc9c;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: 1px solid rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --glass-blur: blur(16px);
        }

        /* Hide scrollbars globally on all elements */
        * {
            -ms-overflow-style: none !important;
            /* IE and Edge */
            scrollbar-width: none !important;
            /* Firefox */
        }

        *::-webkit-scrollbar {
            width: 0 !important;
            height: 0 !important;
            display: none !important;
            /* Chrome, Safari and Opera */
        }

        /* Specific overrides for containers that tend to show scrollbars in Edge/Windows */
        .events-container,
        .memo-lines,
        .calendar-grid,
        .right-panel,
        .todo-list,
        #settings-view {
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }

        .events-container::-webkit-scrollbar,
        .memo-lines::-webkit-scrollbar,
        .calendar-grid::-webkit-scrollbar,
        .right-panel::-webkit-scrollbar,
        .todo-list::-webkit-scrollbar,
        #settings-view::-webkit-scrollbar {
            display: none !important;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-y: auto;
            /* Clean, Transparent iOS-style Mesh Gradient */
            background-color: #f5f7fa;
            background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            /* Prevent horizontal page shaking on swipe */
        }

        .main-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 480px;

            /* Glassmorphism Main Body */
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-left: var(--glass-border);
            border-right: var(--glass-border);
            box-shadow: var(--glass-shadow);

            position: relative;
            min-height: 100vh;
            border-radius: 0;
        }

        #schedule-view,
        #health-view {
            display: flex;
            flex-direction: column;
            width: 100%;
            flex: 1;
            padding-bottom: 90px;
        }

        #settings-view {
            width: 100%;
            height: 100%;
            display: none;
            padding: 20px;
            background: transparent;
            box-sizing: border-box;
            overflow-y: auto;
            padding-bottom: 70px;
        }

        .calendar-section {
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
            padding: 10px;
            display: flex;
            flex-direction: column;
            background: transparent;
            user-select: none;
            overflow-x: hidden;
            /* Make calendar section take up essentially the full viewport height */
            min-height: calc(100vh - 70px);
        }

        .calendar-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .calendar-header h2 {
            margin: 0;
            font-size: 20px;
            color: #444;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
        }

        .calendar-nav button {
            background: none;
            border: 1px solid #eee;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 5px;
            color: #666;
            transition: all 0.2s;
        }

        .calendar-nav button:hover {
            background-color: #f0f0f0;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* Memo (Glassmorphism) */
        .memo-wrapper {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 10px;
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
            /* Allow goals to wrap instead of forcing width */
            align-items: center;
            gap: 5px;
        }

        .memo-title {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            /* removed nowrap to allow squeezing */
        }

        .memo-lines {
            display: flex;
            flex-grow: 1;
            gap: 10px;
            overflow-x: auto;
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .memo-lines::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari and Opera */
        }

        .memo-line {
            display: flex;
            min-width: 60px;
            /* Reduced to stop pushing the layout wide */
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            padding: 4px 8px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .memo-line input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 13px;
            color: #333;
            width: 100%;
            min-width: 0;
            /* Let it shrink on mobile */
        }

        /* Calendar Grid - No Gaps */
        .calendar-grid {
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            grid-auto-rows: 1fr;
            /* Make rows expand to fill space evenly */
            gap: 0;
            flex-grow: 1;
            /* overflow-y: auto; removed to prevent internal scrolling and let page scroll */
            padding: 0 5px;
            padding-bottom: 20px;
            border-top: none;
            border-left: var(--glass-border);
            overflow: hidden !important;
            /* Ensure no horizontal overflow leakage */
        }

        .calendar-grid::-webkit-scrollbar {
            display: none;
        }

        .day-header {
            text-align: center;
            padding: 5px 2px;
            font-weight: 600;
            color: #222;
            font-size: 13px;
            border-right: var(--glass-border);
            border-bottom: var(--glass-border);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .day-header.sunday {
            color: #e74c3c;
        }

        .day-header.saturday {
            color: #3498db;
        }

        .calendar-cell {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 0;
            min-height: 80px;
            display: flex !important;
            flex-direction: column !important;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
            /* 날짜 간 블록이 끊겨 보이지 않도록 세로 경계선 제거 */
            border-right: none;
            border-bottom: var(--glass-border);
            overflow: visible;
        }

        .calendar-cell:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .calendar-cell.selected {
            background-color: rgba(74, 144, 226, 0.1);
            box-shadow: 0 0 0 3px var(--primary-color) inset;
            /* Ensure z-index doesn't block overflowing text from neighbors */
            z-index: 1 !important;
        }

        .calendar-cell.today {
            background-color: rgba(255, 250, 208, 0.5);
        }

        .day-number-container {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            width: 100%;
            padding-top: 5px;
            padding-bottom: 2px;
            /* 고정된 높이로 날짜 숫자 아래 시작 위치를 통일 */
            height: 32px !important;
            box-sizing: border-box !important;
            flex-shrink: 0 !important;
            overflow: hidden !important;
        }

        .day-number {
            font-weight: 600;
            font-size: 14px;
            color: #555;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            z-index: 2;
        }

        .day-number.holiday {
            color: #e74c3c;
        }

        .mark-circle {
            border: 2px solid #e74c3c;
            color: #e74c3c;
            font-weight: bold;
            background: white;
            width: 18px;
            /* Slightly smaller diameter */
            height: 18px;
            font-size: 12px;
            /* Adjust font to fit */
        }

        .mark-x {
            position: relative;
            color: #95a5a6;
        }

        .mark-x::after,
        .mark-x::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: #e74c3c;
            top: 50%;
            left: 0;
        }

        .mark-x::after {
            transform: rotate(45deg);
        }

        .events-container {
            display: flex;
            flex-direction: column;
            gap: 1px;
            overflow: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
            flex-grow: 1 !important;
        }

        .range-pill {
            font-size: 9px;
            padding: 1px 4px;
            white-space: nowrap;
            overflow: visible;
            line-height: 1.1;
            min-width: 0;
            min-height: 12px;
            color: #333;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            z-index: 5;
        }

        .range-pill.range-start {
            border-radius: 3px 0 0 3px;
            margin-left: 2px;
            margin-right: -5px;
            padding-right: 8px;
        }

        .range-pill.range-middle {
            border-radius: 0;
            margin-left: -5px;
            margin-right: -5px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .range-pill.range-end {
            border-radius: 0 3px 3px 0;
            margin-left: -5px;
            margin-right: 2px;
            padding-left: 8px;
        }

        .range-pill.range-single {
            border-radius: 3px;
            margin: 0 2px;
        }

        .event-pill {
            font-size: 9px;
            padding: 1px 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.1;
            margin: 0 1px;
            border-radius: 3px;
        }

        .range-pill-text {
            position: absolute;
            left: 6px;
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
            font-weight: 600;
            color: #333;
            font-size: 9px;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.5);
        }

        /* Todo List Panel (Bottom Half) */
        .right-panel {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            border-top: var(--glass-border);
        }

        .todo-wrapper {
            display: flex;
            flex-direction: column;
        }

        .todo-header {
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: var(--glass-border);
        }

        .selected-date-display {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .todo-item-container {
            position: relative;
            width: 100%;
            margin-bottom: 8px;
            border-radius: 8px;
            background-color: transparent;
            touch-action: pan-y;
            /* Prevent native horizontal drag/navigation */
            -webkit-tap-highlight-color: transparent;
            /* Remove gray tap highlight */
        }

        .todo-item {
            display: flex;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            min-width: 0;
            position: relative;
            z-index: 2;
            transition: transform 0.2s ease-out;
            touch-action: pan-y;
            /* Crucial: stop iOS horizontal scroll dragging */

            /* Combined Glassmorphism & Layout */
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.5);
            border: var(--glass-border);
            border-left: 4px solid #eee;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            user-select: none;
            /* Prevent text selection during long press/drag */
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .todo-input {
            user-select: text !important;
            /* Allow selection inside input for typing */
            -webkit-user-select: text !important;
        }

        .todo-delete-btn {
            position: absolute;
            top: 0;
            right: 0;
            background-color: #ff3b30;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.2s;
            /* Occupies full height and width behind the main item */
            width: 100%;
            height: 100%;
            border-radius: 8px;
            /* Match container radius since overflow is no longer hidden */
        }

        .todo-item.dragging {
            opacity: 0.5;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0px;
            /* Margins handled by container */
            flex: 1;
            overflow-y: auto;
        }

        .todo-item:active {
            cursor: grabbing;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.6);
        }

        .todo-item.dragging {
            opacity: 0.5;
        }

        .todo-checkbox {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .todo-input {
            flex-grow: 1;
            border: none;
            font-size: 16px;
            padding: 8px 5px;
            font-family: inherit;
            background: transparent;
            min-width: 0;
            color: #333;
            width: 100%;
        }

        .todo-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
        }

        .todo-input.completed {
            text-decoration: line-through;
            color: #aaa;
        }


        .sortable-ghost {
            opacity: 0.2;
            background-color: var(--primary-color) !important;
            border: 2px dashed var(--primary-color) !important;
        }

        .sortable-chosen {
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2) !important;
            background: rgba(255, 255, 255, 0.9) !important;
            z-index: 1000;
            border-left-color: var(--primary-color) !important;
        }

        .sortable-drag {
            opacity: 0.9;
        }

        /* Custom Color Swatch Palette CSS */
        .color-picker-wrapper {
            position: relative;
            display: inline-block;
            margin-left: 10px;
        }

        .swatch-trigger {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px #ddd;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .swatch-trigger:hover {
            transform: scale(1.1);
        }

        .palette-popup {
            display: none;
            /* Hidden by default */
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 5px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            padding: 10px;
            z-index: 9999;
            width: 140px;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .palette-popup.show {
            display: grid;
        }

        .palette-color-item {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: transform 0.1s;
        }

        .palette-color-item:hover {
            transform: scale(1.2);
            border: 1px solid #333;
        }

        /* Bottom Menu (iOS Style) */
        .bottom-menu {
            height: 70px;
            padding-bottom: 20px;

            /* Glassmorphism Navigation */
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: var(--glass-border);
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.05);

            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            /* Changed to fixed so it stays at the bottom of the screen */
            bottom: 0;
            width: 100%;
            max-width: 480px;
            /* Match main-content width */
            z-index: 1000;
            transition: transform 0.3s ease-in-out;
        }

        .bottom-menu.hidden {
            transform: translateY(100%);
        }

        .menu-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #8e8e93;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .menu-item:hover,
        .menu-item.active {
            color: var(--primary-color);
            background-color: transparent;
        }

        .menu-item.active::after {
            content: '';
            display: block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--primary-color);
            margin-top: 3px;
        }

        /* Settings CSS */
        .settings-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .settings-container h2 {
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .setting-item {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 18px;
        }

        .setting-item input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            cursor: pointer;
        }

        .danger-zone {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px dotted #ccc;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .auth-card h2 {
            margin: 0;
            color: var(--primary-color);
        }

        .auth-card p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .auth-input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            width: 100%;
        }

        .auth-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-secondary {
            background: #eee;
            color: #333;
        }

        .auth-btn:hover {
            opacity: 0.8;
        }

        .auth-error {
            color: #e74c3c;
            font-size: 13px;
            min-height: 18px;
        }

        /* Routine Bottom Sheet Modal */
        #routine-modal {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;

            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: var(--glass-border);

            border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            z-index: 2000;
            transition: bottom 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 24px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #routine-modal.show {
            bottom: 0;
        }

        .routine-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--glass-border);
            padding-bottom: 10px;
        }

        .routine-header h3 {
            margin: 0;
            color: var(--primary-color);
        }

        .routine-close {
            cursor: pointer;
            font-size: 20px;

    <script>
        // ====== Firebase Setup ======
        const firebaseConfig = {
            apiKey: "AIzaSyDPRFTO7qYhlJJyjOfb-8nsR7OLmyqVV9U",
            authDomain: "hojin-schedule.firebaseapp.com",
            projectId: "hojin-schedule",
            storageBucket: "hojin-schedule.firebasestorage.app",
            messagingSenderId: "38268072154",
            appId: "1:38268072154:web:c73f3ce19d42abdfe175e3",
            measurementId: "G-LWXJWBR9FM"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;

        // ====== Auth UI Logic ======
        const authOverlay = document.getElementById('auth-overlay');
        const authEmailInput = document.getElementById('auth-email');
        const authPwdInput = document.getElementById('auth-password');
        const authError = document.getElementById('auth-error');

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                authOverlay.style.opacity = '0';
                setTimeout(() => authOverlay.style.display = 'none', 300);
                loadCloudData(); // Load user data from Firestore
            } else {
                currentUser = null;
                authOverlay.style.display = 'flex';
                setTimeout(() => authOverlay.style.opacity = '1', 10);
            }
        });

        async function handleLogin() {
            authError.innerText = '';
            try {
                await auth.signInWithEmailAndPassword(authEmailInput.value, authPwdInput.value);
            } catch (error) {
                authError.innerText = error.message;
            }
        }

        async function handleSignup() {
            authError.innerText = '';
            try {
                await auth.createUserWithEmailAndPassword(authEmailInput.value, authPwdInput.value);
            } catch (error) {
                authError.innerText = error.message;
            }
        }

        function handleLogout() {
            auth.signOut();
            // Clear local states
            scheduleData = {};
            memoData = {};
            dateMarks = {};
            rangeBlocks = [];

            healthData = {};
            healthMarks = {};
            localStorage.clear();
            renderCalendar();
            renderTodos();
            renderMemos();
            renderHealthCalendar();
            renderWorkoutLogs();
            switchView('schedule');
        }

        async function loadCloudData() {
            if (!currentUser) return;
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    scheduleData = data.scheduleData || {};
                    memoData = data.memoData || {};
                    dateMarks = data.dateMarks || {};
                    rangeBlocks = data.rangeBlocks || [];

                    healthData = data.healthData || {};
                    healthMarks = data.healthMarks || {};
                    if (data.defaultColor) defaultColor = data.defaultColor;

                    // Sync to local
                    localStorage.setItem('scheduleData', JSON.stringify(scheduleData));
                    localStorage.setItem('memoData', JSON.stringify(memoData));
                    localStorage.setItem('dateMarks', JSON.stringify(dateMarks));
                    localStorage.setItem('rangeBlocks', JSON.stringify(rangeBlocks));

                    localStorage.setItem('healthData', JSON.stringify(healthData));
                    localStorage.setItem('healthMarks', JSON.stringify(healthMarks));
                    localStorage.setItem('defaultColor', defaultColor);
                }
                renderCalendar();
                renderMemos();
                if (selectedDate) renderTodos();
                renderHealthCalendar();
                renderWorkoutLogs();
            } catch (e) {
                console.error("Error loading cloud data:", e);
            }
        }

        // Data & State - Organized Pastel Colors
        const PRESET_COLORS = [
            // Row 1: Pinks & Reds
            '#ffe4e1', '#ffc0cb', '#ffb6c1', '#f8bbd0', '#f48fb1',
            // Row 2: Oranges & Yellows
            '#fff3e0', '#ffe0b2', '#ffccbc', '#fff9c4', '#fff59d',
            // Row 3: Greens & Mints
            '#f1f8e9', '#dcedc8', '#e8f5e9', '#c8e6c9', '#e0f2f1',
            // Row 4: Blues & Purples
            '#e3f2fd', '#bbdefb', '#e0f7fa', '#f3e5f5', '#e1bee7'
        ];

        let currentYear = 2026;
        let currentMonth = 0;
        let selectedDate = null;
        let activePaletteId = null; // Track open palette
        let currentRoutineTaskIndex = null; // Track which task is opening the routine modal

        // Close palette if clicked outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.color-picker-wrapper')) {
                document.querySelectorAll('.palette-popup').forEach(p => p.classList.remove('show'));
                activePaletteId = null;
            }
        });

        let defaultColor = localStorage.getItem('defaultColor') || '#ffb3ba';
        let scheduleData = JSON.parse(localStorage.getItem('scheduleData')) || {};
        let memoData = JSON.parse(localStorage.getItem('memoData')) || {};
        let dateMarks = JSON.parse(localStorage.getItem('dateMarks')) || {};
        let rangeBlocks = JSON.parse(localStorage.getItem('rangeBlocks')) || [];

        let healthData = JSON.parse(localStorage.getItem('healthData')) || {};
        let healthMarks = JSON.parse(localStorage.getItem('healthMarks')) || {};
        let healthCurrentYear = new Date().getFullYear();
        let healthCurrentMonth = new Date().getMonth();
        let healthSelectedDate = null;
        let healthClickCounts = {};
        let healthClickTimers = {};

        function saveHealthMarks() {
            localStorage.setItem('healthMarks', JSON.stringify(healthMarks));
            syncToCloud();
        }

        // Initialize Settings Palette
        document.addEventListener('DOMContentLoaded', () => {
            const settingsPalette = document.getElementById('settings-palette');
            const settingsTrigger = document.getElementById('setting-default-color-trigger');

            PRESET_COLORS.forEach(colorHex => {
                const swatch = document.createElement('div');
                swatch.className = 'palette-color-item';
                swatch.style.backgroundColor = colorHex;
                swatch.onclick = (e) => {
                    e.stopPropagation();
                    defaultColor = colorHex;
                    settingsTrigger.style.backgroundColor = colorHex;
                    settingsPalette.classList.remove('show');
                    activePaletteId = null;
                };
                settingsPalette.appendChild(swatch);
            });

            settingsTrigger.style.backgroundColor = defaultColor;
        });

        // Save Logic (Dual Save: Local + Cloud)
        function syncToCloud() {
            if (!currentUser) return;
            db.collection('users').doc(currentUser.uid).set({
                scheduleData: scheduleData,
                memoData: memoData,
                dateMarks: dateMarks,
                defaultColor: defaultColor,
                rangeBlocks: rangeBlocks,

                healthData: healthData,
                healthMarks: healthMarks
            }, { merge: true }).catch(e => console.error("Sync error:", e));
        }
        function saveRangeBlocks() {
            localStorage.setItem('rangeBlocks', JSON.stringify(rangeBlocks));
            syncToCloud();
        }

        function saveHealth() {
            // Auto-trim trailing empty weight boxes
            Object.keys(healthData).forEach(dateKey => {
                healthData[dateKey].forEach(w => {
                    if (Array.isArray(w.weights)) {
                        while (w.weights.length > 1 && w.weights[w.weights.length - 1] === '') {
                            w.weights.pop();
                        }
                        // Ensure at least 1 slot
                        if (w.weights.length === 0) w.weights.push('');
                    }
                });
            });
            localStorage.setItem('healthData', JSON.stringify(healthData));
            syncToCloud();
        }

        function saveSchedule() {
            localStorage.setItem('scheduleData', JSON.stringify(scheduleData));
            syncToCloud();
        }
        function saveMemo() {
            localStorage.setItem('memoData', JSON.stringify(memoData));
            syncToCloud();
        }
        function saveMarks() {
            localStorage.setItem('dateMarks', JSON.stringify(dateMarks));
            syncToCloud();
        }

        function saveSettings() {
            localStorage.setItem('defaultColor', defaultColor);
            syncToCloud();
            renderCalendar();
            renderTodos();
            alert("저장되었습니다.");
        }

        function clearCurrentMonth() {
            if (!confirm(`${currentYear}년 ${currentMonth + 1}월의 모든 할 일 데이터를 초기화하시겠습니까?`)) return;
            const yearMonthStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            Object.keys(scheduleData).forEach(key => {
                if (key.startsWith(yearMonthStr)) delete scheduleData[key];
            });
            delete memoData[yearMonthStr];
            saveSchedule();
            saveMemo();
            renderCalendar();
            if (selectedDate && selectedDate.startsWith(yearMonthStr)) {
                renderTodos();
            }
            renderMemos();
            alert(`${currentYear}년 ${currentMonth + 1}월 초기화 완료`);
        }

        function clearCurrentHealthMonth() {
            const ym = `${healthCurrentYear}-${String(healthCurrentMonth + 1).padStart(2, '0')}`;
            if (!confirm(`${healthCurrentYear}년 ${healthCurrentMonth + 1}월의 모든 운동 기록을 초기화하시겠습니까?`)) return;
            Object.keys(healthData).forEach(key => {
                if (key.startsWith(ym)) delete healthData[key];
            });
            // Also clear health marks for that month
            Object.keys(healthMarks).forEach(key => {
                if (key.startsWith(ym)) delete healthMarks[key];
            });
            saveHealth();
            saveHealthMarks();
            renderHealthCalendar();
            if (healthSelectedDate && healthSelectedDate.startsWith(ym)) {
                renderWorkoutLogs();
            }
            alert(`${healthCurrentYear}년 ${healthCurrentMonth + 1}월 운동 기록 초기화 완료`);
        }

        function clearAllSchedule() {
            if (!confirm('⚠️ 전체 스케줄 데이터를 초기화하시겠습니까?\n모든 월의 할 일, 메모, 마크가 삭제됩니다.')) return;
            if (!confirm('정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
            scheduleData = {};
            memoData = {};
            dateMarks = {};
            saveSchedule();
            saveMemo();
            saveMarks();
            renderCalendar();
            renderTodos();
            renderMemos();

        function renderCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendarEl.innerHTML = '';

            document.getElementById('current-month').innerText = `${currentYear}년 ${currentMonth + 1}월`;

            const days = ['일', '월', '화', '수', '목', '금', '토'];
            days.forEach((d, index) => {
                const cel = document.createElement('div');
                cel.className = 'day-header';
                if (index === 0) cel.classList.add('sunday');
                if (index === 6) cel.classList.add('saturday');
                cel.innerText = d;
                calendarEl.appendChild(cel);
            });

            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);

            for (let i = 0; i < firstDay.getDay(); i++) {
                const cel = document.createElement('div');
                cel.className = 'calendar-cell empty';
                cel.style.pointerEvents = 'none';
                cel.style.backgroundColor = '#f9f9f9';
                calendarEl.appendChild(cel);
            }

            for (let d = 1; d <= lastDay.getDate(); d++) {
                const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

                const cel = document.createElement('div');
                cel.className = 'calendar-cell';
                if (dateKey === selectedDate) cel.classList.add('selected');

                // Set z-index to allow text from earlier days to overflow onto later days
                const colIndex = (firstDay.getDay() + d - 1) % 7;
                cel.style.zIndex = 10 - colIndex;

                const now = new Date();
                if (currentYear === now.getFullYear() && currentMonth === now.getMonth() && d === now.getDate()) {
                    cel.classList.add('today');
                }

                let markClass = '';
                if (dateMarks[dateKey] === 'circle') markClass = 'mark-circle';
                else if (dateMarks[dateKey] === 'x') markClass = 'mark-x';

                cel.onclick = (e) => onCellClick(e, dateKey);

                // Check if holiday or Sunday
                const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
                const isHoliday = KOREAN_HOLIDAYS_2026[dateKey];
                const isSunday = dayOfWeek === 0;
                let dayNumClass = markClass;
                if (isHoliday || isSunday) dayNumClass += ' holiday';

                let html = `<div class="day-number-container"><div class="day-number ${dayNumClass}" ${isHoliday ? `title="${isHoliday}"` : ''}>${d}</div></div><div class="events-container">`;

                // Render range blocks (with placeholders for alignment so bars connect across days)
                const monthStart = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-01`;
                const monthEnd = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(lastDay.getDate()).padStart(2, '0')}`;
                const monthRanges = rangeBlocks
                    .map((rb, idx) => ({ ...rb, idx }))
                    .filter(rb => rb.endDate >= monthStart && rb.startDate <= monthEnd);

                monthRanges.forEach(rb => {
                    const inRange = (dateKey >= rb.startDate && dateKey <= rb.endDate);
                    if (inRange) {
                        let posClass = 'range-single';
                        if (rb.startDate !== rb.endDate) {
                            if (dateKey === rb.startDate) posClass = 'range-start';
                            else if (dateKey === rb.endDate) posClass = 'range-end';
                            else posClass = 'range-middle';
                        }
                        // 텍스트는 블록 기간의 첫날 또는 주의 첫날(일요일)에 표시하여 줄바꿈 시에도 보이게 함
                        const isSunday = (new Date(currentYear, currentMonth, d).getDay() === 0);
                        const label = (dateKey === rb.startDate || isSunday) ? `<span class="range-pill-text">${rb.text || ''}</span>` : '';
                        html += `<div class="range-pill ${posClass}" style="background:${rb.color};" onclick="event.stopPropagation();handleRangeBlockTap(${rb.idx})">${label}</div>`;
                    } else {
                        // Invisible placeholder keeps the row alignment so the block doesn't break between days
                        const placeholderClass = (rb.startDate !== rb.endDate) ? 'range-middle' : 'range-single';
                        html += `<div class="range-pill ${placeholderClass}" style="visibility:hidden;">&nbsp;</div>`;
                    }
                });

                const tasks = scheduleData[dateKey] || [];
                tasks.forEach(t => {
                    if (t.text) {
                        let bg = t.color || defaultColor;
                        let fontColor = '#000';
                        let border = `1px solid ${bg}`;
                        let textDecor = t.checked ? 'line-through' : 'none';
                        let opacity = t.checked ? '0.5' : '1';
                        html += `<div class="event-pill" style="background:${bg}; color:${fontColor}; border:${border}; text-decoration:${textDecor}; opacity:${opacity};">${t.text}</div>`;
                    }
                });

                html += `</div>`;
                cel.innerHTML = html;
                calendarEl.appendChild(cel);
            }
        }

        // Render Todos
        function renderTodos() {
            if (!selectedDate) return;
            document.getElementById('selected-date-title').innerText = selectedDate;
            const todoListEl = document.getElementById('todo-list');
            todoListEl.innerHTML = '';

            if (!scheduleData[selectedDate]) {
                scheduleData[selectedDate] = Array(3).fill().map(() => ({ text: '', checked: false, color: null }));
            }
            const tasks = scheduleData[selectedDate];

            tasks.forEach((task, index) => {

                // Wrapper for Swipe-to-Delete
                const liContainer = document.createElement('div');
                liContainer.className = 'todo-item-container';

                // Delete Button (Background)
                const deleteBtn = document.createElement('div');
                deleteBtn.className = 'todo-delete-btn';
                deleteBtn.innerText = '삭제';
                deleteBtn.onclick = () => {
                    // Check if it's part of a routine
                    if (task.routineId) {
                        showRoutineDeleteModal(selectedDate, index);
                    } else {
                        // Normal delete
                        if (confirm('이 할 일을 삭제하시겠습니까?')) {
                            scheduleData[selectedDate].splice(index, 1);
                            saveSchedule();
                            renderTodos();
                            renderCalendar();
                        }
                    }
                };

                const li = document.createElement('li');
                li.className = 'todo-item';
                li.setAttribute('data-index', index);

                // Swipe Logic
                let liTouchStartX = 0;
                let liTouchStartY = 0;
                let liTouchCurrentX = 0;
                let liIsSwiping = false;
                let liSwipeDirectionDetermined = false;

                li.addEventListener('touchstart', (e) => {
                    // Prevent swipe if tapping on interactive elements like color picker or buttons
                    const target = e.target;
                    if (target.closest('.color-picker-wrapper') ||
                        target.closest('.todo-checkbox') ||
                        target.closest('.routine-trigger-btn')) {
                        return;
                    }

                    liTouchStartX = e.touches[0].clientX;
                    liTouchStartY = e.touches[0].clientY;
                    liIsSwiping = true;
                    liSwipeDirectionDetermined = false;
                    li.style.transition = 'none';
                }, { passive: true });

                li.addEventListener('touchmove', (e) => {
                    if (!liIsSwiping) return;
                    liTouchCurrentX = e.touches[0].clientX;
                    const currentY = e.touches[0].clientY;
                    const deltaX = liTouchCurrentX - liTouchStartX;
                    const deltaY = currentY - liTouchStartY;

                    if (!liSwipeDirectionDetermined) {
                        // If moving more vertically than horizontally, it's a scroll
                        if (Math.abs(deltaY) > Math.abs(deltaX)) {
                            liIsSwiping = false;
                            li.style.transform = 'translateX(0)';
                            deleteBtn.style.opacity = '0';
                            return;
                        }
                        liSwipeDirectionDetermined = true;
                    }

                    // Only horizontal swipes reach here, prevent page bouncy/scrolling
                    if (e.cancelable) e.preventDefault();

                    deleteBtn.style.opacity = '1'; // Show red background only when swiping

                    // Only allow swiping LEFT (negative deltaX) up to -85px
                    if (deltaX < 0 && deltaX > -85) {
                        li.style.transform = `translateX(${deltaX}px)`;
                    } else if (deltaX <= -85) {
                        li.style.transform = `translateX(-85px)`; // Elastic limit
                    }
                }, { passive: false });

                li.addEventListener('touchend', (e) => {
                    if (!liIsSwiping) return;
                    liIsSwiping = false;
                    const deltaX = liTouchCurrentX - liTouchStartX;

                    li.style.transition = 'transform 0.2s cubic-bezier(0.25, 1, 0.5, 1)';

                    if (deltaX < -40) {
                        // Snap open (-70px is width of delete button)
                        li.style.transform = `translateX(-70px)`;

                        // Auto-close if clicking anywhere else
                        const closeSwipe = (evt) => {
                            if (!liContainer.contains(evt.target)) {
                                li.style.transform = `translateX(0)`;
                                deleteBtn.style.opacity = '0';
                                document.removeEventListener('touchstart', closeSwipe);
                            }
                        };
                        // Add slightly later to not trigger instantly
                        setTimeout(() => document.addEventListener('touchstart', closeSwipe), 50);
                    } else {
                        // Snap closed
                        li.style.transform = `translateX(0)`;
                        deleteBtn.style.opacity = '0';
                    }
                }, { passive: true });

                let effectiveColor = task.color || defaultColor;
                if (task.checked) {
                    li.style.borderLeftColor = effectiveColor;
                    li.style.backgroundColor = effectiveColor + '30';
                } else {
                    li.style.borderLeftColor = '#eee';
                    li.style.backgroundColor = '#f9f9f9';
                }

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'todo-checkbox';
                checkbox.checked = task.checked;
                checkbox.onchange = () => {
                    task.checked = checkbox.checked;
                    saveSchedule();
                    renderTodos();
                    renderCalendar();
                };

                const input = document.createElement('input');
                input.type = 'text';
                input.className = `todo-input ${task.checked ? 'completed' : ''}`;
                input.value = task.text;
                input.placeholder = "할 일을 입력하세요";
                input.onblur = (e) => {
                    task.text = e.target.value;
                    saveSchedule();
                    renderCalendar();
                };
                input.oninput = (e) => {
                    task.text = e.target.value;
                    renderCalendar();
                };
                input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };

                // Custom Color Picker Wrapper
                const colorPickerWrapper = document.createElement('div');
                colorPickerWrapper.className = 'color-picker-wrapper';

                const swatchTrigger = document.createElement('div');
                swatchTrigger.className = 'swatch-trigger';
                swatchTrigger.style.backgroundColor = task.color || defaultColor;
                swatchTrigger.title = "항목 색상 변경";

                const palettePopup = document.createElement('div');
                palettePopup.className = 'palette-popup';
                const popupId = 'palette-' + index;
                palettePopup.id = popupId;

                swatchTrigger.onclick = (e) => {
                    e.stopPropagation();
                    togglePalette(popupId);
                };

                PRESET_COLORS.forEach(colorHex => {
                    const swatch = document.createElement('div');
                    swatch.className = 'palette-color-item';
                    swatch.style.backgroundColor = colorHex;
                    swatch.onclick = (e) => {
                        e.stopPropagation(); // Prevent document click from closing immediately before processing
                        task.color = colorHex;
                        swatchTrigger.style.backgroundColor = colorHex;
                        palettePopup.classList.remove('show');
                        activePaletteId = null;

                        saveSchedule();
                        renderTodos();
                        renderCalendar(); // React immediately
                    };
                    palettePopup.appendChild(swatch);
                });

                colorPickerWrapper.appendChild(swatchTrigger);
                colorPickerWrapper.appendChild(palettePopup);

                // Routine Trigger Button
                const routineBtn = document.createElement('button');
                routineBtn.className = 'routine-trigger-btn';
                routineBtn.innerHTML = '🔄';
                routineBtn.title = "반복 루틴 설정";
                routineBtn.onclick = (e) => {

                todoListEl.appendChild(liContainer);
            });

            // Initialize Sortable for Todos
            new Sortable(todoListEl, {
                animation: 150,
                delay: 1000,
                delayOnTouchOnly: false,
                touchStartThreshold: 5,
                forceFallback: true, // Better consistency for long-press
                fallbackTolerance: 3,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                dragClass: 'sortable-drag',
                onEnd: (evt) => {
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    if (oldIndex === newIndex) return;

                    const targetList = scheduleData[selectedDate];
                    const draggedItem = targetList.splice(oldIndex, 1)[0];
                    targetList.splice(newIndex, 0, draggedItem);

                    saveSchedule();
                    renderCalendar();
                    renderTodos();
                }
            });

            // Add task button
            const addBtn = document.createElement('button');
            addBtn.className = 'btn btn-primary';
            addBtn.style.cssText = 'width:100%;margin-top:10px;padding:10px;font-size:14px;border-radius:10px;';
            addBtn.innerText = '+ 할 일 추가';
            addBtn.onclick = () => {

        function openRoutineModal(taskIndex) {
            const task = scheduleData[selectedDate][taskIndex];
            if (!task || !task.text) {
                alert("먼저 할 일을 입력한 후 루틴을 설정해주세요.");
                return;
            }
            currentRoutineTaskIndex = taskIndex;
            selectedRoutineColor = task.color || defaultColor;
            document.getElementById('routine-start-date').value = selectedDate;

            // Set default end date to 1 month from now
            const startD = new Date(selectedDate);
            startD.setMonth(startD.getMonth() + 1);
            document.getElementById('routine-end-date').value = startD.toISOString().split('T')[0];

            // Build color swatches
            const colorsDiv = document.getElementById('routine-color-picker');
            colorsDiv.innerHTML = '';
            PRESET_COLORS.forEach(c => {
                const sw = document.createElement('div');
                sw.style.cssText = `width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${c === selectedRoutineColor ? '#333' : 'transparent'};`;
                sw.onclick = () => {
                    selectedRoutineColor = c;
                    colorsDiv.querySelectorAll('div').forEach(d => d.style.borderColor = 'transparent');
                    sw.style.borderColor = '#333';
                };
                colorsDiv.appendChild(sw);

        function closeRoutineModal() {
            document.getElementById('dim-overlay').classList.remove('show');
            document.getElementById('routine-modal').classList.remove('show');
            currentRoutineTaskIndex = null;
        }

        function applyRoutine() {
            if (currentRoutineTaskIndex === null) return;

            const taskToRepeat = scheduleData[selectedDate][currentRoutineTaskIndex];
            const startDateStr = document.getElementById('routine-start-date').value;
            const endDateStr = document.getElementById('routine-end-date').value;
            const freqDays = parseInt(document.getElementById('routine-frequency').value, 10);

            if (!endDateStr) {
                alert("종료 날짜를 선택해주세요.");
                return;
            }

            // Generate a unique ID for this routine
            const routineId = 'routine_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

            // Assign routineId to the original task
            taskToRepeat.routineId = routineId;

            let currentStr = startDateStr;
            let addedCount = 0;

            // Generate sequence
            while (true) {
                let d = new Date(currentStr);
                d.setDate(d.getDate() + freqDays);
                currentStr = d.toISOString().split('T')[0];

                if (currentStr > endDateStr) break;

                // Add to scheduleData
                if (!scheduleData[currentStr]) {
                    scheduleData[currentStr] = Array(10).fill().map(() => ({ text: '', checked: false, color: null }));
                }

                // Find first empty slot
                let slotIndex = scheduleData[currentStr].findIndex(t => t.text === '');
                if (slotIndex !== -1) {
                    scheduleData[currentStr][slotIndex] = {
                        text: taskToRepeat.text,
                        checked: false,
                        color: selectedRoutineColor || taskToRepeat.color || defaultColor,
                        routineId: routineId
                    };
                    addedCount++;
                }
            }

            saveSchedule();
            renderCalendar();
            closeRoutineModal();
            alert(`루틴 생성 완료! 총 ${addedCount}개의 일정이 추가되었습니다.`);
        }

            document.getElementById('schedule-view').style.display = (tabId === 'schedule-view') ? 'flex' : 'none';
            document.getElementById('settings-view').style.display = (tabId === 'settings-view') ? 'block' : 'none';

            // Re-render when switching back to schedule
            if (tabId === 'schedule-view') {
                renderCalendar();

            }
        };

        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
            renderTodos();
        }

        let isMonthAnimating = false;

        function changeMonth(delta, isFromSwipe = false, currentSwipeX = 0) {
            if (isMonthAnimating) return;
            isMonthAnimating = true;

            const grid = document.getElementById('calendar');
            const direction = delta > 0 ? -1 : 1;

            // 1. Slide Out Old Month
            grid.style.transition = 'transform 0.2s ease-in, opacity 0.2s';
            if (isFromSwipe) {
                // Continue slide from the finger's current position to offscreen
                const exitX = delta > 0 ? (currentSwipeX - window.innerWidth / 2) : (currentSwipeX + window.innerWidth / 2);
                grid.style.transform = `translateX(${exitX}px)`;
            } else {
                // Button click, slide out slightly then disappear
                grid.style.transform = `translateX(${direction * 30}%)`;
            }
            grid.style.opacity = '0';

            setTimeout(() => {
                // 2. Data Update
                currentMonth += delta;
                if (currentMonth > 11) { currentMonth = 0; currentYear++; }
                else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
                renderCalendar();
                renderMemos();

                // 3. Teleport grid to opposite side invisibly
                grid.style.transition = 'none';
                grid.style.transform = `translateX(${-direction * 30}%)`;

                // 4. Slide In New Month
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        grid.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease-out';
                        grid.style.transform = 'translateX(0)';
                        grid.style.opacity = '1';

                        // 5. Clean up
                        setTimeout(() => {
                            grid.style.transition = '';
                            isMonthAnimating = false;
                        }, 300);
                    });
                });
            }, 200);
        }

        function goToToday() {
            const now = new Date();
            currentYear = 2026;
            currentMonth = 0;
            if (now.getFullYear() === 2026) {
                currentMonth = now.getMonth();
                const dKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                selectDate(dKey);
            } else {
                selectDate('2026-01-01');
            }
            renderMemos();
        }
        // ====== Range Block Modal Functions ======
        const RANGE_COLORS = ['#bbdefb', '#c8e6c9', '#fff9c4', '#f8bbd0', '#e1bee7', '#ffccbc', '#b2dfdb', '#d1c4e9'];
        let pendingRangeColor = RANGE_COLORS[0];
        let editingRangeIdx = -1;

        function openRangeModal(editIdx) {
            editingRangeIdx = (editIdx !== undefined) ? editIdx : -1;
            const isEdit = editingRangeIdx >= 0;
            const rb = isEdit ? rangeBlocks[editingRangeIdx] : null;

            document.querySelector('#range-modal h3').innerText = isEdit ? '📅 기간 블록 수정' : '📅 기간 블록 추가';
            document.getElementById('range-modal-text').value = isEdit ? rb.text : '';
            const today = selectedDate || `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-01`;
            document.getElementById('range-start-date').value = isEdit ? rb.startDate : today;
            document.getElementById('range-end-date').value = isEdit ? rb.endDate : today;

            // Build color swatches
            const colorsDiv = document.getElementById('range-modal-colors');
            colorsDiv.innerHTML = '';
            pendingRangeColor = isEdit ? rb.color : RANGE_COLORS[0];
            RANGE_COLORS.forEach(c => {
                const sw = document.createElement('div');
                sw.style.cssText = `width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${c === pendingRangeColor ? '#333' : 'transparent'};`;
                sw.onclick = () => {
                    pendingRangeColor = c;
                    colorsDiv.querySelectorAll('div').forEach(d => d.style.borderColor = 'transparent');
                    sw.style.borderColor = '#333';
                };
                colorsDiv.appendChild(sw);
            });
            document.getElementById('range-modal').style.display = 'flex';
        }

        function confirmRangeBlock() {
            const text = document.getElementById('range-modal-text').value.trim();
            const startDate = document.getElementById('range-start-date').value;
            const endDate = document.getElementById('range-end-date').value;
            if (!text) { alert('일정명을 입력하세요.'); return; }
            if (!startDate || !endDate) { alert('시작일과 종료일을 입력하세요.'); return; }
            if (startDate > endDate) { alert('종료일이 시작일보다 빠릅니다.'); return; }

            if (editingRangeIdx >= 0) {
                // Edit mode
                rangeBlocks[editingRangeIdx] = { startDate, endDate, text, color: pendingRangeColor };
            } else {
                // Add mode
                rangeBlocks.push({ startDate, endDate, text, color: pendingRangeColor });
            }
            editingRangeIdx = -1;
            saveRangeBlocks();
            document.getElementById('range-modal').style.display = 'none';
            renderCalendar();
        }

        function cancelRangeBlock() {
            editingRangeIdx = -1;
            document.getElementById('range-modal').style.display = 'none';
        }

        function handleRangeBlockTap(idx) {
            const rb = rangeBlocks[idx];
            document.getElementById('range-action-title').innerText = rb.text;
            document.getElementById('range-action-dates').innerText = `${rb.startDate} ~ ${rb.endDate}`;
            document.getElementById('range-action-modal').style.display = 'flex';

            document.getElementById('btn-range-edit').onclick = () => {
                document.getElementById('range-action-modal').style.display = 'none';
                openRangeModal(idx);
            };
            document.getElementById('btn-range-delete').onclick = () => {
                document.getElementById('range-action-modal').style.display = 'none';
                if (confirm(`"${rb.text}" 기간 블록을 삭제하시겠습니까?`)) {
                    rangeBlocks.splice(idx, 1);

        // Touch Swipe Navigation for Calendar (Native Feel)
        const calendarEl = document.getElementById('calendar');
        let touchStartX = 0;
        let touchStartY = 0;
        let touchCurrentX = 0;
        let isSwiping = false;
        let swipeDirectionDetermined = false;

        calendarEl.addEventListener('touchstart', e => {
            if (isMonthAnimating) return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            touchCurrentX = touchStartX;
            isSwiping = true;
            swipeDirectionDetermined = false;
            calendarEl.style.transition = 'none'; // Disable transition for 1:1 finger tracking
        }, { passive: true });

        calendarEl.addEventListener('touchmove', e => {
            if (!isSwiping || isMonthAnimating) return;
            const currentY = e.changedTouches[0].screenY;
            touchCurrentX = e.changedTouches[0].screenX;

            const deltaX = touchCurrentX - touchStartX;
            const deltaY = currentY - touchStartY;

            if (!swipeDirectionDetermined) {
                // If moving more vertically than horizontally, it's a scroll
                if (Math.abs(deltaY) > Math.abs(deltaX)) {
                    isSwiping = false;
                    calendarEl.style.transform = '';
                    return;
                }
                swipeDirectionDetermined = true;
            }

            // Only horizontal swipes reach here, prevent page bouncy/scrolling
            if (e.cancelable) e.preventDefault();

            // Drag the calendar grid directly with the finger
            calendarEl.style.transform = `translateX(${deltaX}px)`;
        }, { passive: false });

        calendarEl.addEventListener('touchend', e => {
            if (!isSwiping || isMonthAnimating) return;
            isSwiping = false;
            const deltaX = touchCurrentX - touchStartX;
            const swipeThreshold = 50;

            if (deltaX < -swipeThreshold) {
                // Swiped Left -> Next Month
                changeMonth(1, true, deltaX);
            } else if (deltaX > swipeThreshold) {
                // Swiped Right -> Prev Month
                changeMonth(-1, true, deltaX);
            } else {
                // Drag not far enough, snap back to center
                calendarEl.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                calendarEl.style.transform = 'translateX(0)';
                setTimeout(() => {
                    calendarEl.style.transition = '';
                }, 300);
            }
        }, { passive: true });
        // Hide bottom menu when scrolling down, show when scrolling up
        let lastScrollY = 0;
        window.addEventListener('scroll', () => {
            const bottomMenu = document.querySelector('.bottom-menu');
            const currentScrollY = window.scrollY;
            if (currentScrollY > lastScrollY && currentScrollY > 10) {
                // Scrolling down
                bottomMenu.classList.add('hidden');
            } else {
                // Scrolling up or at top
                bottomMenu.classList.remove('hidden');
            }
            lastScrollY = currentScrollY;
        });

        // ====== Health Calendar & Workout Logger ======
        function renderHealthCalendar() {
            const monthEl = document.getElementById('health-current-month');
            const calGrid = document.getElementById('health-calendar');
            monthEl.innerText = `${healthCurrentYear}년 ${healthCurrentMonth + 1}월`;
            calGrid.innerHTML = '';

            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            dayNames.forEach((d, i) => {
                const hdr = document.createElement('div');
                hdr.className = 'day-header' + (i === 0 ? ' sunday' : i === 6 ? ' saturday' : '');
                hdr.innerText = d;
                calGrid.appendChild(hdr);
            });

            const firstDay = new Date(healthCurrentYear, healthCurrentMonth, 1).getDay();
            const daysInMonth = new Date(healthCurrentYear, healthCurrentMonth + 1, 0).getDate();
            const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

            for (let i = 0; i < totalCells; i++) {
                const cel = document.createElement('div');
                cel.className = 'day-cell';
                const dayNum = i - firstDay + 1;

                if (dayNum >= 1 && dayNum <= daysInMonth) {
                    const dateStr = `${healthCurrentYear}-${String(healthCurrentMonth + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
                    const numContainer = document.createElement('div');
                    numContainer.className = 'day-number-container';
                    const numEl = document.createElement('div');
                    numEl.className = 'day-number';
                    numEl.innerText = dayNum;
                    numContainer.appendChild(numEl);
                    cel.appendChild(numContainer);

                    // Show workout count indicator
                    if (healthData[dateStr]) {
                        const filled = healthData[dateStr].filter(w => w.name && w.name.trim() !== '').length;
                        if (filled > 0) {
                            const badge = document.createElement('div');
                            badge.style.cssText = 'font-size:9px;color:#e74c3c;font-weight:bold;margin-top:1px;';
                            badge.innerText = `💪${filled}`;
                            cel.appendChild(badge);
                        }
                    }

                    const col = i % 7;
                    if (col === 0) numEl.style.color = '#e74c3c';
                    if (col === 6) numEl.style.color = '#3498db';

                    const today = new Date();
                    if (healthCurrentYear === today.getFullYear() && healthCurrentMonth === today.getMonth() && dayNum === today.getDate()) {
                        cel.classList.add('today');
                    }
                    if (dateStr === healthSelectedDate) {
                        cel.classList.add('selected');
                    }

                    // Apply health marks (circle / x) to day number
                    if (healthMarks[dateStr] === 'circle') {
                        numEl.classList.add('mark-circle');
                    } else if (healthMarks[dateStr] === 'x') {
                        numEl.classList.add('mark-x');
                    }

                    // Multi-click: single=select, double=circle, triple=x
                    cel.onclick = () => {
                        healthSelectedDate = dateStr;
                        healthClickCounts[dateStr] = (healthClickCounts[dateStr] || 0) + 1;
                        if (healthClickTimers[dateStr]) clearTimeout(healthClickTimers[dateStr]);
                        healthClickTimers[dateStr] = setTimeout(() => {
                            let count = healthClickCounts[dateStr];
                            healthClickCounts[dateStr] = 0;
                            if (count === 2) {
                                if (healthMarks[dateStr] === 'circle') delete healthMarks[dateStr];
                                else healthMarks[dateStr] = 'circle';
                                saveHealthMarks();
                            } else if (count >= 3) {
                                if (healthMarks[dateStr] === 'x') delete healthMarks[dateStr];
                                else healthMarks[dateStr] = 'x';
                                saveHealthMarks();
                            }
                            renderHealthCalendar();
                            renderWorkoutLogs();
                        }, 300);
                    };
                } else {
                    cel.classList.add('empty');
                }
                calGrid.appendChild(cel);
            }
        }

        function renderWorkoutLogs() {
            const titleEl = document.getElementById('health-selected-date-title');
            const listEl = document.getElementById('health-list');
            if (!healthSelectedDate) {
                titleEl.innerText = '날짜를 선택하세요';

                return;
            }
            titleEl.innerText = healthSelectedDate + ' 운동 기록';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'btn';
                copyBtn.style.cssText = 'width:100%;margin-bottom:10px;padding:8px;font-size:13px;border-radius:8px;background:#f0f0f0;color:#555;border:1px dashed #ccc;cursor:pointer;';
                copyBtn.innerText = '📋 이전 날짜 운동 기록 불러오기';
                copyBtn.onclick = () => {
                    // Find the most recent previous date with workout data
                    const sortedDates = Object.keys(healthData).filter(d => d < healthSelectedDate && healthData[d].some(w => w.name && w.name.trim() !== '')).sort().reverse();
                    if (sortedDates.length === 0) {
                        alert('이전 운동 기록이 없습니다.');
                        return;
                    }
                    const prevDate = sortedDates[0];
                    if (!confirm(`${prevDate}의 운동 기록을 불러올까요?`)) return;
                    healthData[healthSelectedDate] = JSON.parse(JSON.stringify(healthData[prevDate]));
                    // Clear weight values but keep exercise names
                    healthData[healthSelectedDate].forEach(w => {
                        w.weights = w.weights.map(() => '');
                    });
                    saveHealth();
                    renderWorkoutLogs();
                    renderHealthCalendar();
                };

            if (!healthData[healthSelectedDate]) {
                healthData[healthSelectedDate] = Array(5).fill(null).map(() => ({ name: '', weights: ['', '', '', '', ''] }));
            }
            const workouts = healthData[healthSelectedDate];
            // Migrate old data format (single weight string -> array)
            workouts.forEach(w => {
                if (!Array.isArray(w.weights)) {

                // Swipe-to-delete logic
                let startX = 0, currentX = 0, swiping = false;
                li.addEventListener('touchstart', e => {
                    if (e.target.tagName === 'INPUT') return;
                    startX = e.changedTouches[0].screenX;
                    currentX = startX;
                    swiping = true;
                    li.style.transition = 'none';
                }, { passive: true });
                li.addEventListener('touchmove', e => {
                    if (!swiping) return;
                    currentX = e.changedTouches[0].screenX;
                    const dx = currentX - startX;
                    if (dx < 0) {
                        li.style.transform = `translateX(${dx}px)`;
                        deleteBtn.style.opacity = Math.min(1, Math.abs(dx) / 80);
                    }
                }, { passive: true });
                li.addEventListener('touchend', () => {
                    if (!swiping) return;
                    swiping = false;
                    const dx = currentX - startX;
                    li.style.transition = 'transform 0.3s ease';

                nameInput.value = workout.name || '';
                nameInput.placeholder = '종목';

                    workout.name = e.target.value;

                };

                        workout.weights[wIdx] = e.target.value;

                addWeightBtn.innerText = '+';

                    const newOrder = items.map(item => {
                        const idx = parseInt(item.getAttribute('data-index'));

                    healthData[healthSelectedDate] = newOrder;
                    saveHealth();
                    renderWorkoutLogs();
                    renderHealthCalendar();

            // Add exercise button
            const addBtn = document.createElement('button');
            addBtn.className = 'btn btn-primary';
            addBtn.style.cssText = 'width:100%;margin-top:10px;padding:10px;font-size:14px;border-radius:10px;';
            addBtn.innerText = '+ 종목 추가';
            addBtn.onclick = () => {
                workouts.push({ name: '', weights: ['', '', '', '', ''] });
                saveHealth();
                renderWorkoutLogs();

                setTimeout(() => { healthCalEl.style.transition = ''; }, 300);
            }
        }, { passive: true });

        // Hide bottom menu when scrolling down
        window.addEventListener('scroll', () => {
            const bottomMenu = document.querySelector('.bottom-menu');
            if (window.scrollY > 10) {
                bottomMenu.classList.add('hidden');
            } else {
                bottomMenu.classList.remove('hidden');
            }
        });

        // Init
        goToToday();
        goToHealthToday();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker registered:', reg))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>

</html>
